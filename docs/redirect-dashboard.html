<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microvista — URL-Migrationsstatus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e12;
    --surface: #14171e;
    --surface-2: #1b1f28;
    --border: #262b36;
    --border-light: #333a48;
    --text: #e2e5eb;
    --text-muted: #7d8594;
    --text-dim: #4e5564;
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.08);
    --green-border: rgba(52, 211, 153, 0.2);
    --amber: #fbbf24;
    --amber-bg: rgba(251, 191, 36, 0.08);
    --amber-border: rgba(251, 191, 36, 0.2);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.08);
    --red-border: rgba(248, 113, 113, 0.2);
    --blue: #60a5fa;
    --blue-bg: rgba(96, 165, 250, 0.08);
    --brand: #003366;
    --accent: #ff6600;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Instrument Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-mark {
    width: 10px;
    height: 32px;
    background: var(--accent);
    border-radius: 2px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header h1 span {
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 8px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .header-badge {
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
  }

  /* ── Main ── */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 40px;
  }

  /* ── KPI Row ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
  }

  .kpi-card.total::before { background: var(--blue); }
  .kpi-card.ok::before { background: var(--green); }
  .kpi-card.redirect::before { background: var(--amber); }
  .kpi-card.missing::before { background: var(--red); }

  .kpi-label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    font-family: 'DM Mono', monospace;
  }

  .kpi-card.total .kpi-value { color: var(--blue); }
  .kpi-card.ok .kpi-value { color: var(--green); }
  .kpi-card.redirect .kpi-value { color: var(--amber); }
  .kpi-card.missing .kpi-value { color: var(--red); }

  .kpi-pct {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* ── Progress Bar ── */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .progress-title {
    font-size: 14px;
    font-weight: 600;
  }

  .progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--green);
  }

  .progress-bar {
    height: 8px;
    background: var(--surface-2);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }

  .progress-bar .seg-ok {
    background: var(--green);
    transition: width 0.8s ease;
  }

  .progress-bar .seg-redirect {
    background: var(--amber);
    transition: width 0.8s ease;
  }

  .progress-bar .seg-missing {
    background: var(--red);
    opacity: 0.4;
    transition: width 0.8s ease;
  }

  .progress-legend {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
  }

  .legend-dot.ok { background: var(--green); }
  .legend-dot.redirect { background: var(--amber); }
  .legend-dot.missing { background: var(--red); opacity: 0.5; }

  /* ── Charts Row ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 80px 1fr 40px;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .bar-label {
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    height: 20px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
    display: flex;
    align-items: center;
  }

  .bar-fill.ok { background: var(--green-bg); border: 1px solid var(--green-border); }
  .bar-fill.redirect { background: var(--amber-bg); border: 1px solid var(--amber-border); }
  .bar-fill.missing { background: var(--red-bg); border: 1px solid var(--red-border); }

  .bar-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }

  /* ── Donut ── */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .donut-svg {
    width: 100px;
    height: 100px;
    transform: rotate(-90deg);
    flex-shrink: 0;
  }

  .donut-svg circle {
    fill: none;
    stroke-width: 10;
    cx: 50;
    cy: 50;
    r: 40;
  }

  .donut-bg { stroke: var(--surface-2); }
  .donut-slice { transition: stroke-dashoffset 0.8s ease; }

  .donut-labels {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .donut-label-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .donut-label-item .dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .donut-label-item .val {
    font-family: 'DM Mono', monospace;
    color: var(--text);
    margin-left: auto;
    padding-left: 12px;
  }

  /* ── Filter / Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .filter-btn {
    background: var(--surface);
    border: none;
    color: var(--text-muted);
    padding: 8px 14px;
    font-size: 12px;
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border-right: 1px solid var(--border);
    transition: all 0.15s;
  }

  .filter-btn:last-child { border-right: none; }
  .filter-btn:hover { background: var(--surface-2); color: var(--text); }
  .filter-btn.active { background: var(--surface-2); color: var(--text); box-shadow: inset 0 -2px 0 var(--accent); }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    width: 280px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }

  .result-count {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    margin-left: auto;
  }

  /* ── Table ── */
  .table-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-section-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .table-section-title {
    font-size: 14px;
    font-weight: 600;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 10px 16px;
    background: var(--surface-2);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--text); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: rgba(255, 255, 255, 0.02); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 10px 16px;
    vertical-align: top;
  }

  .cell-path {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    word-break: break-all;
    max-width: 320px;
  }

  .cell-title {
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-muted);
    font-size: 12px;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  .status-badge.ok {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
  }

  .status-badge.redirect {
    background: var(--amber-bg);
    color: var(--amber);
    border: 1px solid var(--amber-border);
  }

  .status-badge.missing {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid var(--red-border);
  }

  .lang-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--surface-2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    text-transform: uppercase;
  }

  .arrow-cell {
    color: var(--text-dim);
    text-align: center;
    font-size: 16px;
  }

  .table-scroll {
    max-height: 600px;
    overflow-y: auto;
  }

  .table-scroll::-webkit-scrollbar { width: 6px; }
  .table-scroll::-webkit-scrollbar-track { background: var(--surface); }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  .empty-new { color: var(--red); opacity: 0.6; font-style: italic; }

  /* ── Section breakdown ── */
  .section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
  }

  .section-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: var(--surface-2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }

  .section-chip:hover { border-color: var(--border-light); }
  .section-chip .name { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; }
  .section-chip .cnt { color: var(--text-dim); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  .delay-1 { animation-delay: 0.05s; }
  .delay-2 { animation-delay: 0.1s; }
  .delay-3 { animation-delay: 0.15s; }
  .delay-4 { animation-delay: 0.2s; }
  .delay-5 { animation-delay: 0.25s; }
  .delay-6 { animation-delay: 0.3s; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .main { padding: 20px 16px; }
    .header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-mark"></div>
    <h1>Microvista<span>URL-Migrationsstatus</span></h1>
  </div>
  <div class="header-right">
    <div class="header-badge">WP &rarr; Astro</div>

  </div>
</div>

<div class="main">

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpis"></div>

  <!-- Progress -->
  <div class="progress-section animate-in delay-2" id="progress-section"></div>

  <!-- Charts -->
  <div class="charts-row" id="charts-row"></div>

  <!-- Table -->
  <div class="controls" id="controls"></div>
  <div class="table-section animate-in delay-6">

      <div id="table-count" class="result-count"></div>
    </div>
    <div class="table-scroll">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

301","v":"yes","r":"L56: /umweltallianz-sachen-anhalt/ -> /zertifizierungen","x":"Redirect target exists in new sitemap.","ti":"Umweltallianz Sachsen-Anhalt"},{"o":"/zerstoerungsfreie-pruefung-automobilindustrie","t":"page","l":"de","n":"/branchen/automotive","m":"redirect_301_in_sitemap","s":"301","v":"yes","r":"L38: /zerstoerungsfreie-pruefung-automobilindustrie/ -> /branchen/automotive","x":"Redirect target exists in new sitemap.","ti":"Zerstörungsfreie Prüfung für die Automobilindustrie"},{"o":"/zerstoerungsfreie-pruefung-batteriesystemen","t":"page","l":"de","n":"/branchen/e-mobilitaet","m":"redirect_301_in_sitemap","s":"301","v":"yes","r":"L41: /zerstoerungsfreie-pruefung-batteriesystemen/ -> /branchen/e-mobilitaet","x":"Redirect target exists in new sitemap.","ti":"Zerstörungsfreie Prüfung von Batteriesystemen"},{"o":"/zerstoerungsfreie-pruefung-leichtmetallguss","t":"page","l":"de","n":"/branchen/leichtmetallguss","m":"redirect_301_in_sitemap","s":"301","v":"yes","r":"L39: /zerstoerungsfreie-pruefung-leichtmetallguss/ -> /branchen/leichtmetallguss","x":"Redirect target exists in new sitemap.","ti":"Zerstörungsfreie Prüfung von Leichtmetallguss mit CT| Microvista"},{"o":"/zerstoerungsfreie-serienpruefung","t":"page","l":"de","n":"/zerstoerungsfreie-serienpruefung","m":"direct_200","s":"200","v":"yes","r":"","x":"Path exists directly in new sitemap.","ti":"Zerstörungsfreie Serienprüfung schnell & automatisiert"},{"o":"/zerstoerungsfreie-werkstoffpruefung","t":"page","l":"de","n":"/branchen/werkstoffpruefung","m":"redirect_301_in_sitemap","s":"301","v":"yes","r":"L44: /zerstoerungsfreie-werkstoffpruefung/ -> /branchen/werkstoffpruefung","x":"Redirect target exists in new sitemap.","ti":"Zerstörungsfreie Werkstoffprüfung: Verfahren, Normen & CT"},{"o":"/zerstorungsfreie-prufung-von-eisenguss","t":"page","l":"de","n":"/branchen/eisenguss","m":"redirect_301_in_sitemap","s":"301","v":"yes","r":"L40: /zerstorungsfreie-prufung-von-eisenguss/ -> /branchen/eisenguss","x":"Redirect target exists in new sitemap.","ti":"Zerstörungsfreie Prüfung von Eisenguss"},{"o":"/zertifizierungen","t":"page","l":"de","n":"/zertifizierungen","m":"direct_200","s":"200","v":"yes","r":"","x":"Path exists directly in new sitemap.","ti":"Zertifizierungen"},{"o":"/zfp-archaeologie","t":"page","l":"de","n":"/branchen/archaeologie","m":"redirect_301_in_sitemap","s":"301","v":"yes","r":"L43: /zfp-archaeologie/ -> /branchen/archaeologie","x":"Redirect target exists in new sitemap.","ti":"Zerstörungsfreie Prüfung in der Archäologie"}];

// ── State ──
let activeStatus = 'all';
let activeLang = 'all';
let searchTerm = '';

function statusOf(d) {
  if (d.m === 'direct_200') return 'ok';
  if (d.m === 'redirect_301_in_sitemap') return 'redirect';
  return 'missing';
}

function filtered() {
  return DATA.filter(d => {
    if (activeStatus !== 'all' && statusOf(d) !== activeStatus) return false;
    if (activeLang !== 'all' && d.l !== activeLang) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return d.o.toLowerCase().includes(q) || d.n.toLowerCase().includes(q) || d.ti.toLowerCase().includes(q);
    }
    return true;
  });
}

const total = DATA.length;
const okCount = DATA.filter(d => d.m === 'direct_200').length;
const redirCount = DATA.filter(d => d.m === 'redirect_301_in_sitemap').length;
const missCount = DATA.filter(d => d.m === 'no_mapping').length;
const mapped = okCount + redirCount;
const mappedPct = ((mapped / total) * 100).toFixed(1);

// ── KPI Cards ──
document.getElementById('kpis').innerHTML = `
  <div class="kpi-card total animate-in delay-1">
    <div class="kpi-label">Gesamt URLs</div>
    <div class="kpi-value">${total}</div>
    <div class="kpi-pct">alte WordPress-Seiten</div>
  </div>
  <div class="kpi-card ok animate-in delay-2">
    <div class="kpi-label">Direkt (200)</div>
    <div class="kpi-value">${okCount}</div>
    <div class="kpi-pct">${((okCount/total)*100).toFixed(1)}% — Pfad identisch</div>
  </div>
  <div class="kpi-card redirect animate-in delay-3">
    <div class="kpi-label">Redirect (301)</div>
    <div class="kpi-value">${redirCount}</div>
    <div class="kpi-pct">${((redirCount/total)*100).toFixed(1)}% — umgeleitet</div>
  </div>
  <div class="kpi-card missing animate-in delay-4">
    <div class="kpi-label">Ohne Mapping</div>
    <div class="kpi-value">${missCount}</div>
    <div class="kpi-pct">${((missCount/total)*100).toFixed(1)}% — Handlung nötig</div>
  </div>
`;

// ── Progress Bar ──
document.getElementById('progress-section').innerHTML = `
  <div class="progress-header">
    <div class="progress-title">Migrations-Fortschritt</div>
    <div class="progress-pct">${mappedPct}% abgedeckt</div>
  </div>
  <div class="progress-bar">
    <div class="seg-ok" style="width:${(okCount/total)*100}%"></div>
    <div class="seg-redirect" style="width:${(redirCount/total)*100}%"></div>
    <div class="seg-missing" style="width:${(missCount/total)*100}%"></div>
  </div>
  <div class="progress-legend">
    <span><span class="legend-dot ok"></span>Direkt (${okCount})</span>
    <span><span class="legend-dot redirect"></span>301 Redirect (${redirCount})</span>
    <span><span class="legend-dot missing"></span>Kein Mapping (${missCount})</span>
  </div>
`;

// ── Charts ──
// By Language
const langs = {};
DATA.forEach(d => { langs[d.l] = langs[d.l] || {ok:0,redirect:0,missing:0}; langs[d.l][statusOf(d)]++; });

// By Content Type
const types = {};
DATA.forEach(d => { types[d.t] = types[d.t] || {ok:0,redirect:0,missing:0}; types[d.t][statusOf(d)]++; });

// By Section (first path segment)
const sections = {};
DATA.forEach(d => {
  const seg = d.o.split('/').filter(Boolean)[0] || '/';
  sections[seg] = sections[seg] || {total:0,ok:0,redirect:0,missing:0};
  sections[seg].total++;
  sections[seg][statusOf(d)]++;
});

function makeStackedBars(groups, maxVal) {
  return Object.entries(groups).sort((a,b) => {
    const ta = a[1].ok + a[1].redirect + a[1].missing;
    const tb = b[1].ok + b[1].redirect + b[1].missing;
    return tb - ta;
  }).map(([label, v]) => {
    const tot = v.ok + v.redirect + v.missing;
    const okW = (v.ok / maxVal) * 100;
    const rW = (v.redirect / maxVal) * 100;
    const mW = (v.missing / maxVal) * 100;
    return `<div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track">
        <div class="bar-fill ok" style="width:${okW}%"></div>
        <div class="bar-fill redirect" style="width:${rW}%"></div>
        <div class="bar-fill missing" style="width:${mW}%"></div>
      </div>
      <div class="bar-count">${tot}</div>
    </div>`;
  }).join('');
}

const maxLang = Math.max(...Object.values(langs).map(v => v.ok + v.redirect + v.missing));
const maxType = Math.max(...Object.values(types).map(v => v.ok + v.redirect + v.missing));

// Donut for missing breakdown
const missingByLang = {};
DATA.filter(d => d.m === 'no_mapping').forEach(d => { missingByLang[d.l] = (missingByLang[d.l]||0)+1; });

const circumference = 2 * Math.PI * 40;
const donutColors = {en: '#60a5fa', de: 'var(--text-dim)', fr: '#a78bfa'};
let donutOffset = 0;
const donutSlices = Object.entries(missingByLang).sort((a,b) => b[1]-a[1]).map(([lang, count]) => {
  const pct = count / missCount;
  const dash = circumference * pct;
  const gap = circumference - dash;
  const slice = `<circle class="donut-slice" stroke="${donutColors[lang]||'#666'}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-donutOffset}" cx="50" cy="50" r="40"/>`;
  donutOffset += dash;
  return slice;
});

document.getElementById('charts-row').innerHTML = `
  <div class="chart-card animate-in delay-3">
    <div class="chart-title">Nach Sprache</div>
    <div class="bar-chart">${makeStackedBars(langs, maxLang)}</div>
  </div>
  <div class="chart-card animate-in delay-4">
    <div class="chart-title">Nach Inhaltstyp</div>
    <div class="bar-chart">${makeStackedBars(types, maxType)}</div>
  </div>
  <div class="chart-card animate-in delay-5">
    <div class="chart-title">Fehlende nach Sprache</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 100 100">
        <circle class="donut-bg" cx="50" cy="50" r="40"/>
        ${donutSlices.join('')}
      </svg>
      <div class="donut-labels">
        ${Object.entries(missingByLang).sort((a,b)=>b[1]-a[1]).map(([lang,count]) =>
          `<div class="donut-label-item">
            <div class="dot" style="background:${donutColors[lang]||'#666'}"></div>
            <span>${lang.toUpperCase()}</span>
            <span class="val">${count}</span>
          </div>`
        ).join('')}
      </div>
    </div>
  </div>
`;

// ── Controls ──
document.getElementById('controls').innerHTML = `
  <div class="filter-group" id="status-filter">
    <button class="filter-btn active" data-v="all">Alle</button>
    <button class="filter-btn" data-v="ok">200</button>
    <button class="filter-btn" data-v="redirect">301</button>
    <button class="filter-btn" data-v="missing">Fehlt</button>
  </div>
  <div class="filter-group" id="lang-filter">
    <button class="filter-btn active" data-v="all">Alle</button>
    <button class="filter-btn" data-v="de">DE</button>
    <button class="filter-btn" data-v="en">EN</button>
    <button class="filter-btn" data-v="fr">FR</button>
  </div>
  <input type="text" class="search-input" id="search" placeholder="Pfad oder Titel suchen...">
`;

document.getElementById('thead').innerHTML = `<tr>
  <th>Status</th>
  <th>Sprache</th>
  <th>Alter Pfad</th>
  <th></th>
  <th>Neuer Pfad</th>
  <th>Titel</th>
  <th>Typ</th>
</tr>`;

function renderTable() {
  const rows = filtered();
  document.getElementById('table-count').textContent = `${rows.length} von ${total} URLs`;
  document.getElementById('tbody').innerHTML = rows.map(d => {
    const st = statusOf(d);
    const statusLabel = st === 'ok' ? '200' : st === 'redirect' ? '301' : 'fehlt';
    return `<tr>
      <td><span class="status-badge ${st}">${statusLabel}</span></td>
      <td><span class="lang-badge">${d.l}</span></td>
      <td class="cell-path">${d.o}</td>
      <td class="arrow-cell">${d.n ? '&rarr;' : ''}</td>
      <td class="cell-path">${d.n || '<span class="empty-new">kein Ziel</span>'}</td>
      <td class="cell-title" title="${d.ti}">${d.ti}</td>
      <td><span class="lang-badge">${d.t}</span></td>
    </tr>`;
  }).join('');
}

// ── Event Listeners ──
document.getElementById('status-filter').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('#status-filter .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeStatus = e.target.dataset.v;
  renderTable();
});

document.getElementById('lang-filter').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('#lang-filter .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeLang = e.target.dataset.v;
  renderTable();
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderTable();
});

renderTable();
</script>
</body>
</html>
