name: "Additive Fertigung"
slug: "additive-fertigung"
description: "CT-Prüfung für additiv gefertigte Bauteile – Defekte finden, bevor sie Kosten verursachen. Microvista prüft Ihre gedruckten Bauteile zerstörungsfrei: Porosität, Stützstrukturreste, innere Risse und CAD-Abweichungen – vollautomatisch mit KI-gestützter Auswertung."
heroImage: "/images/wp/2022/06/stators.jpg"
challenges:
  - title: "Innere Defekte (Poren, Delamination, Risse) sind mit konventioneller Sichtprüfung nicht erkennbar"
    description: "Sichtprüfungsgrenzen"
  - title: "Stützstrukturreste in komplexen Kanälen führen zu späteren Ausfällen im Feld"
    description: "Restrisiko"
  - title: "CAD-Soll-Ist-Abweichungen bleiben unentdeckt und verursachen teure Nacharbeiten"
    description: "Maßhaltigkeit"
  - title: "Qualitätsnachweis für Kunden und Normen (AS9100, IATF) ohne destruktive Prüfung schwierig"
    description: "Normenkonformität"
solutions:
  - title: "Porositätsanalyse"
    description: "Vollständige 3D-Analyse aller inneren Hohlräume, Klassifizierung nach Größe, Position und Anzahl"
  - title: "CAD-Soll-Ist-Vergleich"
    description: "Automatischer Abgleich des CT-Scans mit dem Konstruktions-CAD, Abweichungsprotokoll"
  - title: "Stützstruktur-Check"
    description: "Vollautomatische Detektion von Stützstrukturresten in Innenkonturen und Kühlkanälen"
  - title: "Serienprüfung mit ScanExpress"
    description: "Mobiles CT direkt am 3D-Drucker – jedes Teil nach dem Druck sofort geprüft, keine Transportzeit"
useCases:
  - "Luftfahrt-Turbinenschaufeln aus Titanlegierungen (SLM/EBM)"
