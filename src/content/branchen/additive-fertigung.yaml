name: "Additive Fertigung"
slug: "additive-fertigung"
description: "CT-Prüfung für additiv gefertigte Bauteile – Defekte finden, bevor sie Kosten verursachen. Microvista prüft Ihre gedruckten Bauteile zerstörungsfrei: Porosität, Stützstrukturreste, innere Risse und CAD-Abweichungen – vollautomatisch mit KI-gestützter Auswertung."
heroImage: "/images/wp/2022/06/stators.jpg"
challenges:
  - title: "Innere Defekte (Poren, Delamination, Risse) sind mit konventioneller Sichtprüfung nicht erkennbar"
    description: "Additiv gefertigte Bauteile weisen schichtbedingte innere Defekte auf, die an der Oberfläche vollständig unsichtbar bleiben. Poren, Bindefehler zwischen Schichten und Risse entstehen bereits beim Druckprozess und sind mit Sichtprüfung oder tastender Koordinatenmesstechnik nicht auffindbar. Ein unentdeckter Riss in einem Titanluftfahrtbauteil kann zum Totalversagen führen – mit katastrophalen Konsequenzen für Sicherheit und Haftung."
  - title: "Stützstrukturreste in komplexen Kanälen führen zu späteren Ausfällen im Feld"
    description: "Beim SLM- und DMLS-Druck sind Stützstrukturen in inneren Hohlräumen und Kühlkanälen unvermeidlich. Werden Reste nach der Nachbearbeitung nicht vollständig entfernt, können sie sich im Betrieb lösen – in Hydrauliksystemen, Turbinen oder medizinischen Geräten mit fatalen Folgen. Die Nacharbeit eines im Feld ausgefallenen Bauteils kostet ein Vielfaches der Prüfkosten."
  - title: "CAD-Soll-Ist-Abweichungen bleiben unentdeckt und verursachen teure Nacharbeiten"
    description: "Additive Fertigung unterliegt prozessbedingten Verzügen, Schwindungen und Oberflächenabweichungen, die erst bei der Montage oder im Betrieb auffallen. Ohne CT-gestützten Soll-Ist-Abgleich werden fehlerhafte Erstmuster freigegeben, was kostspielige Werkzeugkorrekturen oder komplette Neudrucke nach sich zieht. Bei Losgrößen ab 50 Stück summieren sich unentdeckte Maßabweichungen schnell auf fünfstellige Nacharbeitskosten."
  - title: "Qualitätsnachweis für Kunden und Normen (AS9100, IATF) ohne destruktive Prüfung schwierig"
    description: "Luft- und Raumfahrt- sowie Automobilkunden verlangen für jedes Erstmuster einen lückenlosen Qualitätsnachweis – inklusive innerer Merkmale, die nur per CT messbar sind. Destruktive Prüfverfahren wie Schleifen und Metallografieren liefern zwar Befunde, vernichten dabei aber das Prüfstück. Für Prototypen und Kleinserien ist das wirtschaftlich kaum vertretbar; zudem fehlt die Reproduzierbarkeit für normkonforme Serienprüfung."
solutions:
  - title: "Porositätsanalyse"
    description: "Microvista erstellt eine vollständige 3D-Kartierung aller inneren Hohlräume im gedruckten Bauteil und klassifiziert jeden Defekt nach Größe, Position und Anzahl. Das Ergebnis ist ein normkonformes Prüfprotokoll mit Bewertung gemäß den jeweils gültigen Freigabegrenzen (z. B. AS9100, ASTM). Der Kunde erhält reproduzierbare, serienbegleitende Qualitätsnachweise ohne ein einziges Bauteil zu zerstören."
  - title: "CAD-Soll-Ist-Vergleich"
    description: "Microvista gleicht den CT-Volumenscan automatisiert mit dem Konstruktions-CAD ab und erstellt ein farbkodiertes Abweichungsprotokoll mit eingehaltenen und überschrittenen Toleranzen. Der Entwicklungsingenieur sieht auf einen Blick, welche Bereiche nachgearbeitet oder im Druckprozess korrigiert werden müssen. So werden fehlerhafte Serien frühzeitig gestoppt und Iterationszyklen drastisch verkürzt."
  - title: "Stützstruktur-Check"
    description: "Microvistas vollautomatische Auswertesoftware detektiert Stützstrukturreste in Innenkonturen, Kühlkanälen und Hohlräumen zuverlässig – unabhängig von ihrer Größe oder Lage. Das System liefert eine genaue Positionsangabe jedes Rests, sodass die Nachbearbeitung gezielt und vollständig erfolgen kann. Besonders bei sicherheitskritischen Bauteilen wie Hydraulikleitungen oder Turbinenkomponenten schließt dieser Schritt eine der häufigsten Ausfallursachen aus."
  - title: "Serienprüfung mit ScanExpress"
    description: "Mit dem mobilen ScanExpress-System fährt Microvista direkt zum Produktionsstandort und prüft Bauteile unmittelbar nach dem Druckprozess – ohne Transportzeiten und Verpackungsaufwand. Die KI-gestützte Auswertung liefert Befunde in unter 60 Sekunden pro Bauteil und ermöglicht eine echte 100%-Prüfung im Serienbetrieb. Fehlerhafte Teile werden noch vor der Nachbearbeitung aussortiert, was den Gesamtausschuss und die Nacharbeitskosten deutlich reduziert."
useCases:
  - "Luftfahrt-Turbinenschaufeln aus Titanlegierungen (SLM/EBM): CT prüft Kühlkanalgeometrie, Wandstärken und Poren – normkonform nach AS9100 und NADCAP-Anforderungen."
  - "Medizinische Implantate mit Gitterstrukturen (PEEK, Titan): Porositätsgrad und Gitterintegrität werden vollständig vermessen, um Osseointegration und mechanische Belastbarkeit sicherzustellen."
  - "Automotive Leichtbauhalter (AlSi10Mg, Edelstahl): CAD-Soll-Ist-Abgleich und Stützstruktur-Check im Erstmusterprozess nach IATF 16949 – inklusive EMPB-Messung."
  - "Kühlkörper und Wärmetauscher mit komplexen inneren Kanälen: CT prüft Kanalquerschnitte, Wandstärken und Stützstrukturreste, die den Durchfluss beeinträchtigen würden."
