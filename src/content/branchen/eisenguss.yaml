name: "Eisenguss / Schwermetall"
slug: "eisenguss"
description: "CT-Prüfung für Eisenguss – auch bei dicken Wandstärken und hoher Dichte zuverlässig. Eisengussteile gelten als CT-Herausforderung – zu dicht, zu schwer, zu komplex. Microvista hat die Technologie und das Know-how, um auch Schwermetallbauteile bis 200 kg zuverlässig zu durchleuchten."
heroImage: "/images/wp/2022/06/stators.jpg"
challenges:
  - title: "Klassische Röntgenprüfung überlagert Geometrien und findet innere Defekte nicht zuverlässig"
    description: "Konventionelle 2D-Röntgenprüfung projiziert das gesamte Volumen auf eine einzige Ebene, wodurch innere Strukturen überlagert werden und Defekte hinter Wandverdickungen oder Rippen verborgen bleiben. Besonders bei komplexen Eisenguss-Geometrien mit Kernschiebern und variierenden Wandstärken ist die Fehlererkennungsrate unzureichend. Unentdeckte Defekte bedeuten, dass fehlerhafte Chargen freigegeben werden – mit dem Risiko von Feldausfällen und Rückrufen."
  - title: "Porosität und Lunker in Eisenguss führen zu Frühausfällen unter mechanischer Belastung"
    description: "Schrumpfungsbedingte Lunker und Gasporosität entstehen beim Erstarren von Eisenguss bevorzugt an thermischen Knotenpunkten – also genau dort, wo später die größten Spannungen wirken. Diese inneren Fehlstellen sind von außen nicht sichtbar und manifestieren sich erst unter Dauerlast oder Vibration als Rissinitiierung und Bauteilversagen. In sicherheitsrelevanten Komponenten wie Motorblöcken, Bremsgehäusen oder Achskörpern kann das fatale Folgen haben."
  - title: "Schlackeeinschlüsse und Kaltnahtstellen sind ohne CT-Analyse nicht klassifizierbar"
    description: "Schlackeeinschlüsse und Kaltnahtstellen entstehen durch Schmelzeführungsfehler und unterscheiden sich in ihrer Gefährlichkeit erheblich – eine pauschale Bewertung ohne 3D-Analyse führt zu unnötigem Ausschuss oder zu fehlerhafter Freigabe. Ohne CT-Analyse können diese Defekte weder lokalisiert noch nach anerkannten Normen klassifiziert werden. Das macht eine normkonforme Freigabeentscheidung unmöglich und erhöht das Haftungsrisiko des Gießers erheblich."
  - title: "Zerstörende Prüfung durch Schleifen kostspielig und liefert nur punktuelle Informationen"
    description: "Die metallografische Prüfung durch Schleifen und Ätzen liefert zwar Befunde, vernichtet dabei aber das Prüfstück und erlaubt nur Aussagen zu den geschliffenen Ebenen – nicht zum gesamten Bauteilvolumen. Bei Losgröße 1 oder Kleinserien teurer Gussteile ist destruktive Prüfung wirtschaftlich nicht vertretbar. CT-Prüfung liefert alle Informationen aus dem gesamten Bauteilvolumen in einem einzigen Messprozess, ohne das Teil zu beschädigen."
solutions:
  - title: "Porositäts- & Lunker-Analyse"
    description: "Microvista kartiert alle inneren Defekte eines Eisengussteils vollständig in 3D und klassifiziert jeden Befund nach Größe, Volumen und Position gemäß ASTM E505 (für Gusseisen) und ASTM E446 (für Stahlguss). Das normkonforme Prüfprotokoll enthält eine Entscheidung über Freigabe, Nacharbeit oder Ausschuss auf Basis definierter Grenzwerte. Der Gießer erhält damit ein rechtssicheres Dokument für Kundenabnahmen und Qualitätsaudits."
  - title: "Schlacke & Kaltnahtstellen"
    description: "Microvistas Auswertesoftware detektiert automatisch Schlackeeinschlüsse, Oxidhäute und unvollständig gefüllte Bereiche im gesamten Bauteilvolumen und differenziert diese nach Typ und Gefährlichkeit. Im Gegensatz zu klassischer Röntgenprüfung liefert CT präzise Volumen- und Lageangaben, die eine normkonforme Klassifizierung und gezielte Prozesskorrektur am Gusswerkzeug ermöglichen. Wiederholte Schmelzeführungsfehler werden so schnell erkannt und behoben."
  - title: "Wandstärken & Soll-Ist"
    description: "Microvista misst Kernversatz, Wandstärkenverteilung und geometrische Abweichungen aus dem CT-Datensatz und gleicht diese mit dem CAD-Modell ab – besonders wichtig bei komplexen Kernguss-Geometrien mit engen Toleranzfeldern. Kernversatz in wasserführenden Kanälen oder ölführenden Bohrungen kann im Betrieb zu Undichtigkeiten führen; CT erkennt diesen Fehler sicher, bevor das Bauteil mechanisch bearbeitet wird. Das spart teure Bearbeitungskosten an fehlerhaften Teilen."
  - title: "ScanExpress für Großteile"
    description: "Die Long-Version des ScanExpress-Systems unterstützt Bauteile mit bis zu 798 mm Hüllkreis und kommt direkt zum Kunden in die Gießerei – ohne dass schwere Gusskörper aufwendig verpackt und transportiert werden müssen. Besonders für Einzelstücke, Prototypen und Erstmuster aus dem Eisenguss ist der mobile Einsatz wirtschaftlich sinnvoller als der Labortransport. Microvista koordiniert Scantermine kurzfristig und liefert Prüfberichte innerhalb weniger Werktage."
useCases:
  - "Motorblöcke und Zylinderköpfe aus Grauguss: CT kartiert alle Poren, Lunker und Kernversätze vollständig in 3D – normkonform nach ASTM E505, mit Freigabeentscheidung pro Bauteil."
  - "Bremsscheiben und Bremssättel (sicherheitsrelevant): CT prüft innere Porosität und Gefügehomogenität, die bei thermomechanischer Dauerbelastung zum Versagen führen können."
  - "Getriebegehäuse und Differenzialgehäuse: Wandstärkenmessung, Lagerbohrungspositionen und Gussfehlernachweis in einem einzigen CT-Scan."
  - "Pumpenkörper und Ventilgehäuse: CT prüft Kanalgeometrie, Dichtflächen-Maßhaltigkeit und innere Defekte in wasserführenden und druckbeaufschlagten Bauteilen."
