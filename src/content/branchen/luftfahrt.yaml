name: "Luft- und Raumfahrt"
slug: "luftfahrt"
description: "CT-Prüfung für Luft- und Raumfahrt – NADCAP-akkreditiert, für sicherheitskritische Bauteile. Triebwerkschaufeln, Strukturkomponenten, CFK-Verbundteile: Microvista prüft Aerospace-Bauteile NADCAP-konform mit industrieller CT – lückenloser Qualitätsnachweis, keine Ausnahmen."
heroImage: "/images/branchen/luftfahrt.jpg"
challenges:
  - title: "NADCAP und AS9100 verlangen lückenlosen, reproduzierbaren Qualitätsnachweis für jedes Bauteil"
    description: "In der Luft- und Raumfahrt reicht Stichprobenprüfung nicht aus: Jedes Flight-Critical-Part muss lückenlos dokumentiert, jeder Prüfschritt rückverfolgbar und jeder Prüfer qualifiziert sein. NADCAP-Audits verlangen den Nachweis kalibrierter Messprozesse, zertifizierter Prüfsoftware und revisionssicherer Archivierung über die gesamte Bauteillebensdauer. Dienstleister ohne NADCAP-Akkreditierung sind für die Zulieferkette in der Aerospace-Industrie nicht zugelassen."
  - title: "Titanlegierungen und CFK-Composites lassen sich mit klassischen ZfP-Methoden nicht vollständig prüfen"
    description: "Titan- und Nickellegierungen streuen Röntgenstrahlung stark und sind für konventionelle Röntgenprüfung bei größeren Wandstärken kaum durchdringbar. CFK-Verbundteile hingegen zeigen mit Ultraschall zwar Lagendefekte, lassen aber keine vollständige 3D-Rekonstruktion von Delaminationen, Hohlräumen und Faserfehlern zu. Nur Hochenergie-CT liefert für beide Materialklassen vollständige dreidimensionale Aussagen über innere Integrität."
  - title: "Kühlbohrungen und innere Kanäle in Triebwerksteilen sind mit anderen Methoden nicht messbar"
    description: "Turbinenschaufeln und Brennkammerbauteile haben hochkomplexe innere Kühlstrukturen mit Wandstärken im Zehntelbereich, die ausschließlich per CT vollständig vermessen werden können. Abweichungen von der Soll-Kanalgeometrie beeinflussen direkt die thermische Belastbarkeit und Lebensdauer der Bauteile – unentdeckte Maßabweichungen können zu Überhitzung und Versagen führen. Kein anderes ZfP-Verfahren kann diese Messaufgabe zerstörungsfrei und vollständig erfüllen."
  - title: "Fehler in Flight-Critical-Parts können zu Totalausfällen führen – Nulltoleranz erforderlich"
    description: "Bei sicherheitskritischen Luftfahrtbauteilen gibt es keine Toleranz für unentdeckte Materialfehler: Poren, Risse oder Einschlüsse über dem zulässigen Grenzwert bedeuten sofortigen Ausschuss – unabhängig von der Fertigungskosten. Die Konsequenz eines Bauteilversagens im Flugbetrieb ist nicht kalkulierbar. Deshalb verlangen Airframers und MROs für Flight-Critical-Parts lückenlose CT-Prüfnachweise von akkreditierten Prüflaboren."
solutions:
  - title: "NADCAP-konforme CT-Prüfung"
    description: "Microvista prüft Aerospace-Bauteile vollständig konform mit den NADCAP-Anforderungen für zerstörungsfreie Prüfung und erstellt alle Berichte nach NAS 410 und AS 7114. Jeder Scan ist vollständig rückverfolgbar, alle Prüfer sind zertifiziert, und die Ergebnisse werden revisionssicher über die Bauteillebensdauer archiviert. Der Kunde erhält damit einen Prüfnachweis, der von allen gängigen Primes und OEMs ohne Nachqualifizierung akzeptiert wird."
  - title: "Titanlegierungen & Superlegierungen"
    description: "Microvistas Hochenergie-CT-Systeme durchdringen zuverlässig auch dichte Titan- und Nickellegierungen und detektieren Poren, Risse und nichtmetallische Einschlüsse unterhalb der zulässigen Grenzwerte. Die Auswertung erfolgt nach den gültigen Aerospace-Normen, und die Befunde werden in normkonformer Prüfberichtstruktur dokumentiert. Auch additiv gefertigte Superlegierungsbauteile werden mit diesem Verfahren vollständig auf innere Defekte geprüft."
  - title: "CFK/CFRP-Verbundanalyse"
    description: "Microvista analysiert Carbon-Composite-Strukturbauteile vollständig in 3D auf Delamination, Faserwellung, Void-Verteilung und Harzarmut nach ASTM E2973 und internen Freigabegrenzen des Kunden. Im Gegensatz zu Ultraschall-C-Scan liefert CT eine präzise dreidimensionale Lokalisierung jeder Fehlstelle, was Reparaturentscheidungen auf eine solide Datenbasis stellt. Die Prüfergebnisse sind direkt für MRO-Dokumentation und Airworthiness-Nachweise verwendbar."
  - title: "Turbinenschaufel-Inspektion"
    description: "Microvista vermisst Kühlkanalgeometrie, Wandstärken und Beschichtungsdicke in gegossenen und additiv gefertigten Turbinenschaufeln vollständig und vergleicht die Ergebnisse mit dem CAD-Modell. Abweichungen über dem Freigabegrenzwert werden automatisch markiert und im Prüfbericht positionsgenau dokumentiert. Der Kunde erhält ein vollständiges Geometrieprotokoll, das für die Bauteilfreigabe und die Lebensdauerberechnung direkt verwendet werden kann."
useCases:
  - "Turbinenschaufeln aus SLM und Feinguss: CT vermisst Kühlkanalgeometrie und Wandstärken vollständig in 3D – NADCAP-konform mit revisionssicherem Prüfprotokoll nach NAS 410."
  - "Strukturkomponenten – Titanspanten und CFK-Segmente: CT-Prüfung auf innere Fehler und CAD-Abgleich für die Freigabe nach AS9100 und kundenspezifischen Prüfanweisungen."
  - "Fahrwerkskomponenten – Buchsen, Lagergehäuse, Hydraulikblöcke: CT-Maßprüfung und Porositätsnachweis für sicherheitskritische Komponenten mit vollständiger Traceability."
  - "Raketentriebwerke – Injektoren und Brennkammern: CT analysiert Kanalgeometrie, Wandstärken und innere Defekte in komplexen additiv gefertigten Triebwerksbauteilen."
