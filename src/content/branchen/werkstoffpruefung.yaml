name: "Werkstoffprüfung (NDT/ZfP)"
slug: "werkstoffpruefung"
description: "Zerstörungsfreie Werkstoffprüfung mit CT – normkonform, schnell, für alle Materialien. Von Metallen über Kunststoffe bis hin zu Verbundwerkstoffen: Microvista prüft Ihre Werkstoffproben und Bauteile nach internationalen Normen – mit Taktzeiten unter 60 Sekunden."
heroImage: "/images/wp/2024/10/Aluminium-Bauteil-in-der-CT-Werkstoffpruefung.webp"
challenges:
  - title: "Klassische ZfP-Methoden (Ultraschall, Magnetpulver) liefern keine vollständigen 3D-Informationen"
    description: "Ultraschall, Magnetpulver- und Eindringprüfung liefern wertvolle Aussagen, sind aber auf bestimmte Geometrien, Oberflächenzustände und Materialen beschränkt und erfassen innere Defekte immer nur in einer oder wenigen Schnittebenen. Komplexe 3D-Fehlergeometrien – Rissformen, Porencluster, Einschlussverteilungen – lassen sich mit diesen Methoden nicht vollständig rekonstruieren. Für Bauteilfreigaben, die auf vollständiger Volumetrischer Analyse basieren müssen, ist industrielle CT die einzig geeignete Methode."
  - title: "Normkonforme Prüfberichte erfordern zertifizierte Prüfer und dokumentierte Prozesse"
    description: "Prüfberichte, die in der industriellen Qualitätskette akzeptiert werden sollen – für OEM-Abnahmen, Behördenaudits oder Gerichtsverfahren – müssen von einem akkreditierten Prüflabor mit qualifiziertem Personal ausgestellt sein. Nicht-akkreditierte CT-Untersuchungen haben in diesen Kontexten keine Beweiskraft und werden von Abnehmern abgelehnt. Microvistas ISO 17025-Akkreditierung stellt sicher, dass alle Prüfberichte international anerkannt, rechtssicher und für alle Verwendungszwecke geeignet sind."
  - title: "Hohe Ausschussraten durch nicht erkannte Materialfehler in frühen Prozessstufen"
    description: "Materialfehler, die in frühen Fertigungsstufen nicht erkannt werden, wandern durch den gesamten Wertschöpfungsprozess und verursachen Ausschuss erst nach der kostenintensivsten Bearbeitung oder sogar im Feld. Für Schmiede-, Sinter- und Gussteile können frühzeitige CT-Prüfungen von Halbzeugen oder Erstmustern die Ausschusskosten erheblich reduzieren. Defekte, die im Rohteil noch günstig zu identifizieren sind, kosten nach vollständiger Bearbeitung ein Vielfaches."
  - title: "Verbundwerkstoffe (CFK, GFK) lassen sich mit konventionellen Methoden kaum prüfen"
    description: "CFK- und GFK-Bauteile sind für Magnetpulver- und Eindringprüfung ungeeignet; Ultraschall ist bei komplexen Geometrien schwer anzuwenden und liefert keine vollständige 3D-Aussage über Delamination und Faserfehllagen. Besonders bei sicherheitskritischen Leichtbaustrukturen im Luft- und Raumfahrt- oder Automobilbereich ist eine vollständige zerstörungsfreie Prüfung mit validierter Erkennungsrate unverzichtbar. CT ist die einzige Methode, die Delaminationen, Faserwellung und Hohlräume in CFK/GFK vollständig und dreidimensional erfasst."
solutions:
  - title: "CT-Werkstoffprüfung"
    description: "Microvista analysiert Metallproben, Sinterteile, Keramiken und Verbundwerkstoffe vollständig in 3D auf Risse, Poren, Einschlüsse und Delaminationen – mit Auflösungen bis in den Mikrometerbereich für hochwertige Werkstoffanalysen. Das Ergebnis ist eine quantitative Aussage zu Defektgröße, -lage und -häufigkeit im gesamten Probenvolumen, nicht nur an der Oberfläche. Für Werkstoffvergleiche, Prozessoptimierungen und Freigabeprüfungen ist CT damit die präziseste verfügbare Methode."
  - title: "Normkonforme Prüfberichte"
    description: "Microvista führt alle Werkstoffprüfungen nach international gültigen Normen durch – DIN EN ISO, ASTM und VDA – und erstellt revisionssichere Prüfberichte, die von Abnehmern, Behörden und Gerichten als valide akzeptiert werden. Alle Prüfprozesse sind in validierten Verfahrensanweisungen dokumentiert, alle Prüfer sind nach den gültigen Normen zertifiziert, und alle Messmittel sind kalibriert und rückverfolgbar auf nationale Normale. Die ISO 17025-Akkreditierung bestätigt die Kompetenz und Unparteilichkeit des Labors."
  - title: "Verbundwerkstoff-Analyse"
    description: "Microvista prüft CFK- und GFK-Bauteile vollständig in 3D auf Delamination, Faserwellung, lokale Faserorientierungsabweichungen und Hohlräume – ohne jede Probenvorbereitung und ohne das Bauteil zu beschädigen. Die Faserlageanalyse liefert Aussagen zur tatsächlichen Faserausrichtung im Bauteil im Vergleich zur Auslegungsannahme, was für Lastpfad-Validierung und Reparaturentscheidungen unverzichtbar ist. Das Ergebnis ist für sicherheitskritische Bauteile unmittelbar als Freigabe- oder Reparaturgrundlage verwendbar."
  - title: "Laminographie für Flachteile"
    description: "Microvistas LayerScan-Technologie (Laminographie) erzeugt hochauflösende Schichtbilder flacher Bauteile wie Leiterplatten, Laminatproben und Blechbauteile, ohne dass eine vollständige 360°-Drehung möglich sein muss. Die Technologie ist ideal für Bauteile, die aufgrund ihrer Geometrie für Standard-CT ungeeignet sind, aber schichtweise analysiert werden sollen. Das Ergebnis sind präzise Schichtbilder, die Defekte in definierten Tiefen lokalisieren und für viele ZfP-Aufgabenstellungen ausreichen."
useCases:
  - "CFK-Faserverbundbauteile auf Delamination und Faserwellung: CT analysiert das gesamte Bauteilvolumen dreidimensional und lokalisiert Fehlstellen auf den Millimeter genau – für Freigabe- und Reparaturentscheidungen."
  - "Keramiken und Sinterteile auf innere Fehlstellen: CT detektiert Poren, Risse und Einschlüsse unterhalb der Auflösungsgrenze klassischer ZfP-Methoden und liefert eine vollständige statistische Fehlerbeschreibung."
  - "Schweißnaht-Qualifizierung und Fehleranalyse: CT analysiert Schweißnähte in Metall und Kunststoff auf Poren, Risse, Bindefehler und geometrische Abweichungen – normkonform nach DIN EN ISO 5817 und ASTM E1032."
  - "Metallurgische Probenanalyse für Forschungsinstitute: CT liefert vollständige 3D-Datensätze zu Porenverteilung, Gefügestruktur und Phasenanalyse – ISO 17025-akkreditiert und für Publikationen zitierfähig."
