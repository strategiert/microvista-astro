name: "Automotive"
slug: "automotive"
description: "Industrielle CT für die Automobilindustrie – von der Erstmusterprüfung bis zur 100%-Serienkontrolle. Ob Zylinderköpfe, Getriebegehäuse, Fahrwerksteile oder Hairpin-Statoren: Microvista liefert normkonforme Prüfergebnisse nach IATF 16949 und VDA mit Taktzeiten unter 60 Sekunden."
heroImage: "/images/wp/2022/06/computed-tomography-scanning-automotive-industry.jpg"
challenges:
  - title: "Blockierte Chargen durch unklare Qualität verursachen Produktionsstillstand beim OEM"
    description: "Wenn ein Tier-1-Lieferant eine Charge nicht freigeben kann, weil innere Qualitätsmerkmale nicht nachgewiesen sind, droht unmittelbarer Produktionsstillstand beim OEM – mit Konventionalstrafen im vier- bis fünfstelligen Bereich pro Stunde. Konventionelle Prüfmethoden wie Ultraschall oder klassische Röntgenprüfung liefern keine ausreichende Aussage über innere Geometrien und Gussfehler. CT-Prüfung schafft in wenigen Stunden den lückenlosen Qualitätsnachweis, der die Charge sofort freigibt."
  - title: "Innere Gussfehler in Aluminium-Druckgussteilen führen zu Feldausfällen mit hohen Rückrufkosten"
    description: "Porosität, Lunker und Kaltnahtstellen in sicherheitsrelevanten Druckgussteilen – etwa Querlenker oder Bremsträger – bleiben bei herkömmlicher Prüfung unentdeckt und manifestieren sich erst unter Dauerlast im Feld. Ein einziger Rückruf kostet in der Automobilindustrie schnell acht- bis neunstellige Summen; hinzu kommen Reputationsschäden und Haftungsrisiken. CT-basierte 100%-Prüfung identifiziert fehlerhafte Bauteile zuverlässig, bevor sie die Produktionslinie verlassen."
  - title: "Erstmusterprüfberichte nach VDA müssen schnell und lückenlos erstellt werden"
    description: "EMPB nach VDA 2 und PPAP verlangen den vollständigen Nachweis aller Maß-, Form- und Lagemerkmale – inklusive innerer Merkmale, die mit Koordinatenmesstechnik allein nicht zugänglich sind. Verzögerungen beim Erstmusternachweis blockieren die Serienanlauffreigabe und können OEM-Produktionsstarts gefährden. Microvistas CT-Messung liefert alle inneren und äußeren Merkmale in einem einzigen Messprozess, inklusive normkonformem Bericht."
  - title: "Hairpin-Stator-Schweißnähte sind mit konventionellen Prüfmethoden nicht zuverlässig prüfbar"
    description: "Bei modernen E-Motoren werden Kupfer-Hairpins präzise verschweißt – jeder Stator hat mehrere hundert Schweißpunkte, bei denen Porosität, fehlende Verschmelzung oder Geometrieabweichungen zu elektrischen Ausfällen im Betrieb führen. Sichtprüfung und konventionelle Verfahren können die Nahtqualität im Inneren der Verschweißung nicht beurteilen. Microvistas Spezialsoftware analysiert automatisiert alle Schweißnähte in einem Scan und kennzeichnet jeden abweichenden Hairpin."
solutions:
  - title: "EMPB nach VDA 2 / PPAP"
    description: "Microvista erstellt vollständige Erstmusterprüfberichte mit CT-Messdaten für alle Innen- und Außenmerkmale, normkonforme Formblätter und ein lückenloses Abweichungsprotokoll. Die CT-Messung ersetzt mehrere separate Messprozesse und liefert gleichzeitig Aussagen zu Geometrie, Wandstärken, Porosität und Formfüllung. Das Ergebnis ist ein sofort vorlegbarer EMPB, der OEM-Anforderungen nach VDA 2 vollständig erfüllt."
  - title: "Hairpin-Stator-Prüfung"
    description: "Microvistas proprietäre Auswertesoftware analysiert vollautomatisch alle Hairpin-Schweißnähte eines Stators auf Porosität, Schweißtiefe und geometrische Abweichungen – in unter 45 Sekunden pro Bauteil. Mit über 200.000 bereits geprüften Hairpins verfügt Microvista über eine umfangreiche Referenzdatenbasis, die die Erkennungsrate fehlerhafter Nähte deutlich erhöht. Die KI-gestützte Auswertung senkt Falschpositivraten und ermöglicht echte 100%-Prüfung in der Serienfertigung."
  - title: "Serienprüfung Druckguss"
    description: "Microvista prüft Aluminium-Druckgussteile vollautomatisch auf Porosität, Lunker und Maßhaltigkeit mit Taktzeiten unter 60 Sekunden – skalierbar von der Erstmusterprüfung bis zur 100%-Serienkontrolle. Die Auswertung erfolgt KI-gestützt nach vordefinierten Freigabegrenzen, sodass fehlerhafte Teile automatisch ausgesteuert werden. Jeder Scan ist vollständig rückverfolgbar und normkonform nach IATF 16949 dokumentiert."
  - title: "CAD-Soll-Ist & Wandstärke"
    description: "Microvista führt vollständige 3D-Geometriekontrollen durch, messen Wandstärken und erstellt farbkodierte CAD-Abgleichsreports, die Abweichungen auf den ersten Blick sichtbar machen. Auch Montageanalysen für komplexe Baugruppen – etwa Dichtflächen, Bohrungspositionen und Kanalgeometrien – werden aus einem einzigen CT-Scan gewonnen. Der Kunde erhält alle relevanten Qualitätsdaten in einem Bericht statt in mehreren separaten Prüfprotokollen."
useCases:
  - "Aluminium-Druckguss-Zylinderköpfe: CT prüft Porosität, Lunker und Maßhaltigkeit der Kühlkanäle – normkonform nach VDA und mit Taktzeiten unter 90 Sekunden in der Serienkontrolle."
  - "Hairpin-Statoren für E-Motoren: Vollautomatische CT-Analyse aller Schweißnähte auf Porosität und Geometrieabweichung – über 200.000 geprüfte Hairpins in der Referenzbasis."
  - "Sicherheitsrelevante Fahrwerksteile (Querlenker, Achsschenkel): CT liefert lückenlose Porositäts- und Maßnachweise für die EMPB-Freigabe nach VDA 2."
  - "Karosserie-Fügeverbindungen (Schweißpunkte, Clinching): CT bewertet Nahtgeometrie, Eindrücktiefe und Materialtrennung bei sicherheitsrelevanten Strukturverbindungen."
