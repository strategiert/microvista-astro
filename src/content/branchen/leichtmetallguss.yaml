name: "Leichtmetallguss (Aluminium)"
slug: "leichtmetallguss"
description: "CT-Prüfung für Aluminium & Magnesium-Druckguss – Sicherheit für Leichtbaubauteile. Aluminium-Druckgussteile in Karosserie, Fahrwerk und Antrieb müssen höchste Anforderungen erfüllen. Microvista prüft vollautomatisch auf Porosität, Formfüllung und Maßhaltigkeit."
heroImage: "/images/wp/2022/08/Porositaetsanalyse-eines-Zylinderkopfs-Zerstoerungsfreie-Pruefung-von-Leichtmetallguss.webp"
challenges:
  - title: "Aluminium-Druckguss neigt zu Gasporosität und Schrumpflunkern – unsichtbar von außen"
    description: "Beim Hochdruckdruckguss von Aluminium entstehen durch eingeschlossene Luft und Schmelzeschwindung Gasporen und Schrumpfungslunker, die sich bevorzugt in dickwandigen Bereichen und thermischen Knotenpunkten bilden. Von der Bauteiloberfläche sind diese Defekte vollständig unsichtbar – sie werden erst unter mechanischer Belastung oder bei der Montage sichtbar, wenn es zu spät ist. In tragenden Fahrwerkskomponenten kann ein unentdeckter Lunker im kritischen Querschnitt zum schlagartigen Bauteilversagen führen."
  - title: "Fragile Geometrien und enge Toleranzen erhöhen das Ausschussrisiko bei Erstmustern"
    description: "Aluminium-Druckguss-Erstmuster mit dünnen Wandbereichen, langen Kernen und komplexen Unterführungen weisen häufig prozessbedingte Geometrieabweichungen auf, die erst bei der ersten Messung sichtbar werden. Ohne CT-Messung bleiben innere Maßmerkmale wie Kernversatz, Bohrungspositionen und Wandstärken ungeprüft – und fehlerhafte Erstmuster werden freigegeben, was aufwendige Nacharbeit oder Neuinvestition im Werkzeug verursacht. CT reduziert das Risiko teurer Fehlfreigaben im Erstmusterstadium erheblich."
  - title: "EMPB nach VDA verlangt vollständigen Dimensionsnachweis auch für innere Merkmale"
    description: "Der Erstmusterprüfbericht nach VDA 2 erfordert den vollständigen Nachweis aller im Zeichnungsblatt geforderten Merkmale – inklusive innerer Bohrungspositionen, Wandstärken und Kanalgeometrien, die mit taktiler Koordinatenmesstechnik allein nicht zugänglich sind. Fehlende Merkmale im EMPB führen zur Ablehnung durch den OEM und verzögern die Serienanlauffreigabe. CT liefert alle inneren und äußeren Maßdaten in einem einzigen Messprozess und schließt damit die letzte Lücke im Erstmusternachweis."
  - title: "Leichtbauteile im Fahrwerk sind sicherheitsrelevant – konventionelle Prüfung reicht nicht"
    description: "Querlenker, Radträger und Achsschenkel aus Aluminium-Druckguss sind crashrelevante Sicherheitsbauteile, bei denen innere Defekte nicht tolerierbar sind. Visuelle Prüfung und taktile Messung geben keine Aussage über innere Porosität oder Lunker im lasttragenden Querschnitt. OEMs verlangen deshalb für diese Bauteile zunehmend CT-basierte Qualitätsnachweise, die die vollständige innere Fehlerfreiheit dokumentieren und im Schadensfall als revisionssicherer Freigabenachweis dienen."
solutions:
  - title: "Porositäts- & Gaseinschluss-Analyse"
    description: "Microvista kartiert alle Gasporen und Schrumpflunker im Bauteilvolumen vollständig in 3D und vergleicht die ermittelten Defektgrößen und -positionen mit den zeichnungsgebundenen Freigabegrenzen. Das Prüfprotokoll enthält eine klare Freigabe- oder Ausschussentscheidung auf Basis normkonformer Klassifizierungskriterien. Seriell gefertigte Teile lassen sich mit demselben Prüfprogramm vollautomatisch und reproduzierbar auswerten."
  - title: "Formfüllungsanalyse"
    description: "Microvista prüft die vollständige Formfüllung des Gussteils auf Kaltnahtstellen, unzureichend gefüllte Randbereiche und Fließfehler, die durch Prozessparameter wie Einspritzgeschwindigkeit, Temperatur und Entlüftung beeinflusst werden. Die 3D-Visualisierung der Fehlstellen ermöglicht eine direkte Zuordnung zu Werkzeugbereichen und Prozessparametern – der Gießer kann gezielt eingreifen. Dieses CT-Feedback macht die Gussprozessoptimierung erheblich effizienter als konventionelle Trial-and-Error-Methoden."
  - title: "EMPB-Messung"
    description: "Microvista erstellt vollständige Maßprotokolle für Aluminium-Druckguss-Erstmuster inkl. aller inneren Merkmale wie Bohrungspositionen, Wandstärken, Kanalgeometrien und Kernversatz. Der EMPB-konforme Bericht nach VDA 2 enthält alle zeichnungsgeforderten Merkmale in normierter Darstellung und ist für die direkte Vorlage beim OEM aufbereitet. Die CT-Messung ersetzt dabei mehrere separate Messprozesse und liefert alle Daten in einem einzigen Arbeitsgang."
  - title: "Querlenker & Fahrwerksteile"
    description: "Microvista führt für sicherheitsrelevante Leichtbau-Fahrwerkskomponenten vollständige CT-Prüfungen mit Porositätsnachweis, Maßprotokoll und CAD-Abgleich durch und dokumentiert die Ergebnisse in revisionssicheren Prüfberichten. Die Prüfprogramme sind nach Kundenvorgaben parametrierbar und für die Serienbegleitung geeignet. Auf Anfrage werden die Prüfberichte direkt in kundenseitige QS-Systeme eingespeist."
useCases:
  - "Aluminium-Druckguss-Querlenker und Radträger: CT prüft Porositätsgrad und Maßhaltigkeit aller crashrelevanten Querschnitte – lückenloser Sicherheitsnachweis für OEM-Freigaben."
  - "Magnesium-Druckguss – Instrumententafelträger und Lenkradgerippe: CT-Erstmusterprüfung auf Wandstärken, Kernversatz und Gussfehler für die Serienanlauffreigabe nach VDA 2."
  - "Strangpressprofile – Längsträger und Stoßfängerquerträger: CT-Querschnittsmessung und Wandstärkennachweis an crashrelevanten Bereichen gemäß Zeichnungsvorgabe."
  - "Gießereientwicklung – Gussprozessoptimierung: CT nach jedem Parameterwechsel visualisiert Formfüllung, Porenverteilung und Kernversatz und beschleunigt den Weg zum stabilen Serienprozess."
