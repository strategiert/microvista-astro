name: "Kunststofftechnik / Spritzguss"
slug: "kunststofftechnik"
description: "CT-Prüfung für Kunststoffbauteile – Einfallstellen, Lunker, Bindenähte zerstörungsfrei aufdecken. Spritzguss-Fehler wie Bindenähte, Einfallstellen und Lunker verbergen sich im Inneren. Microvistas CT-Prüfung macht sie sichtbar – und hilft, Werkzeug- und Prozessparameter gezielt zu optimieren."
heroImage: "/images/wp/2022/06/Dichtlippe-als-CAD-Qualitaetszonen.png"
challenges:
  - title: "Bindenähte und innere Hohlräume in Spritzgussteilen sind von außen nicht erkennbar"
    description: "Bindenähte entstehen dort, wo zwei Schmelzefronten aufeinandertreffen und sich nicht vollständig verschweißen – sie sind von außen vollständig unsichtbar und schwächen das Bauteil mechanisch erheblich. Innere Hohlräume durch unzureichende Formfüllung oder Lufteinschlüsse sind erst sichtbar, wenn das Bauteil unter Belastung versagt. Für strukturelle Kunststoffteile im Automotive- oder Medizinbereich kann das zu Rückrufen und Haftungsansprüchen führen."
  - title: "Faserverstärkte Kunststoffe (GFK, CFK) zeigen Delaminationen erst im CT"
    description: "Delaminationen in CFK- und GFK-Bauteilen entstehen durch Prozessfehler beim Laminieren, Pressen oder Spritzgießen und sind von der Oberfläche nicht erkennbar. Ultraschall-C-Scan liefert zwar Lagenaussagen, ist aber bei komplexen Geometrien schwer anzuwenden und liefert keine vollständige 3D-Information zur Defektlage. CT zeigt Delaminationen, Faserwellung und Harzarmut vollständig im dreidimensionalen Kontext – entscheidend für Lastpfad-Analysen und Reparaturentscheidungen."
  - title: "Werkzeugoptimierung ohne CT-Feedback bedeutet viele Iterationen und hohe Kosten"
    description: "Ohne CT-Feedback nach jedem Werkzeugchange werden Angussposition, Kühlkanalgestaltung und Prozessparameter nach Erfahrungswerten angepasst – ein Trial-and-Error-Prozess, der für komplexe Werkzeuge leicht zehn oder mehr Iterationen erfordert. Jede Werkzeugkorrektur kostet Zeit und Geld; bei Großwerkzeugen summieren sich unnötige Iterationen schnell auf sechsstellige Beträge. CT liefert nach jedem Schuss exakte Informationen darüber, was im Werkzeug wirklich passiert."
  - title: "Toleranzprüfung bei komplexen Kunststoffgeometrien mit Koordinatenmesstechnik allein unzureichend"
    description: "Taktile Koordinatenmesstechnik erfasst nur zugängliche Außenflächen und ist bei komplexen Freiformflächen und Hinterschnitten nur eingeschränkt einsetzbar. Innere Merkmale wie Bohrungspositionen, Wandstärken und Kernversätze bleiben bei der taktilen Messung vollständig unsichtbar – obwohl sie für Funktion und Montage entscheidend sein können. CT-Messtechnik liefert alle Innen- und Außenmerkmale eines Kunststoffbauteils aus einem einzigen Scan."
solutions:
  - title: "Bindenähte & Einfallstellen"
    description: "Microvista lokalisiert Bindenähte, Fließfehler und Einfallstellen im Bauteilinneren exakt in 3D und bewertet ihre Position relativ zu lasttragendem Querschnitt. Das Ergebnis zeigt dem Konstrukteur oder Werkzeugmacher präzise, wo im Bauteil Schwachstellen liegen und wie Angussposition oder Prozessparameter angepasst werden müssen. Damit wird der Weg zur fehlerfreien Serienfertigung deutlich verkürzt."
  - title: "Faseranalyse in GFK/CFK"
    description: "Microvista analysiert lokale Faserorientierung, Faservolumengehalt und Delaminationen in faserverstärkten Kunststoffbauteilen vollständig in 3D. Das Ergebnis gibt Auskunft über die tatsächliche Faserausrichtung im Bauteil im Vergleich zur Auslegungsannahme und zeigt, ob Lastpfade wie konstruiert realisiert wurden. Besonders für sicherheitsrelevante CFK-Strukturbauteile ist diese Analyse ein unverzichtbarer Qualitätsnachweis."
  - title: "Wandstärken & Formfüllung"
    description: "Microvista misst die vollständige Wandstärkenverteilung eines Spritzgussteils, analysiert die Lage von Kernschiebern und erstellt einen farbkodierten CAD-Abgleich mit allen Toleranzabweichungen. Kaltnahtstellen, unzureichend gefüllte Bereiche und Kernversätze werden zuverlässig detektiert, bevor teure Nacharbeitsschritte oder Montageprobleme entstehen. Der Kunde erhält alle relevanten Qualitätsdaten in einem einzigen Prüfbericht."
  - title: "Werkzeugoptimierungs-Feedback"
    description: "Microvista integriert sich als CT-Dienstleister in den iterativen Werkzeugoptimierungsprozess: Nach jedem Parameterwechsel oder jeder Werkzeugkorrektur liefert Microvista innerhalb von 24 Stunden CT-basiertes Feedback zu Formfüllung, Bindenähten und Maßhaltigkeit. Der Feedback-Loop ermöglicht evidenzbasierte Entscheidungen statt Trial-and-Error und reduziert die Zahl der Optimierungsiterationen nachweislich. Kunden berichten von Halbierung der Iterationszyklen bei der Werkzeugentwicklung."
useCases:
  - "Automotive – Instrumententräger und Strukturhalter: CT prüft Bindenähte, Wandstärken und Formfüllung und liefert den Qualitätsnachweis für EMPB und Serienfreigabe."
  - "Medizintechnik – Spritzguss-Gehäuse für Diagnose- und Therapiegeräte: CT-Maßprüfung aller Innen- und Außenmerkmale für MDR-konforme Dokumentation, ohne die Gehäuse zu öffnen."
  - "Elektronik – Steckergehäuse und überspritzte Bauteile: CT prüft Einbettungstiefe von Einlegeteilen, Wandstärken an kritischen Stellen und Formschluss der Umspritzung."
  - "Konsumgüter – CFK-Sportgeräte und Gehäuseteile: Faserlageanalyse und Delaminations-Prüfung stellen sicher, dass Leistungsversprechen und Sicherheitsanforderungen erfüllt sind."
