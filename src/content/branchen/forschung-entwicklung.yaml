name: "Forschung & Entwicklung"
slug: "forschung-entwicklung"
description: "Industrielle CT für Forschung & Entwicklung – Materialforschung bis Produkterprobung. Universitäten, Forschungsinstitute und Entwicklungsabteilungen nutzen Microvistas CT-Expertise für Materialcharakterisierung, Bauteilentwicklung und Failure Analysis – ohne eigenes CT-Investment."
heroImage: "/images/wp/2025/12/3D-Vermessung-von-Bauteilen-mit-industrieller-CT.webp"
challenges:
  - title: "Eigenes CT-Equipment kostet ab 500.000 € – zu teuer für viele Forschungsbudgets"
    description: "Industrielle Hochleistungs-CT-Systeme mit ausreichender Röhrenleistung für Metalle und Verbundwerkstoffe kosten in der Anschaffung ab 500.000 Euro – zuzüglich Wartungsverträge, Raumausstattung und qualifiziertem Personal. Für Forschungsinstitute und Entwicklungsabteilungen ohne CT-Kernkompetenz ist dieses Investment kaum zu rechtfertigen. CT-as-a-Service bei Microvista liefert dieselbe Datenqualität ohne Investitionsbindung."
  - title: "Materialcharakterisierung neuer Legierungen und Werkstoffe erfordert hochauflösende 3D-Analyse"
    description: "Die Entwicklung neuer Leichtbaulegierungen, Hochtemperaturwerkstoffe oder Verbundmaterialien erfordert ein tiefes Verständnis der inneren Gefügestruktur, Porenverteilung und Phasenzusammensetzung – Informationen, die Schliff- und REM-Analysen nur punktuell liefern. Für statistisch belastbare Aussagen zur Materialqualität sind vollständige 3D-Datensätze aus repräsentativen Probenvolumina notwendig. Nur CT liefert diese Daten zerstörungsfrei und mit ausreichender Statistik."
  - title: "Produktentwicklung ohne CT-Feedback: lange Iterationszyklen, hohe Prototypenkosten"
    description: "Ohne CT-gestütztes Feedback im Entwicklungsprozess müssen Konstrukteure Änderungen an Guss-, Sinter- oder Druckparametern blind vornehmen und auf die nächste Bauserie warten. Jeder zusätzliche Iterationszyklus kostet Zeit und Prototypengeld – bei komplexen Bauteilen schnell mehrere Wochen und fünfstellige Beträge. CT nach jedem Entwicklungsschritt macht Prozessauswirkungen sofort sichtbar und verkürzt den Weg zum serienreifen Bauteil erheblich."
  - title: "Normkonforme Prüfberichte für Fördermittelanträge und Publikationen nötig"
    description: "Forschungseinrichtungen, die CT-Daten in wissenschaftlichen Publikationen oder Fördermittelanträgen verwenden wollen, benötigen Prüfergebnisse aus einem akkreditierten Labor – andernfalls werden Daten von Gutachtern und Fördergebern nicht als valide anerkannt. Die eigene Messung mit nicht-kalibriertem Equipment reicht für zitierfähige Ergebnisse nicht aus. Microvistas ISO 17025-Akkreditierung stellt sicher, dass alle Prüfberichte international anerkannt und publikationsreif sind."
solutions:
  - title: "Materialcharakterisierung"
    description: "Microvista analysiert neue Legierungen, Sinterwerkstoffe und Verbundmaterialien auf Porenverteilung, Gefügestruktur und Phasenzusammensetzung in vollständigen 3D-Datensätzen. Das Ergebnis ist eine statistische Auswertung repräsentativer Probenvolumina, die für Werkstoffvergleiche, Prozessoptimierung und Publikationen unmittelbar verwendbar ist. Auf Wunsch liefert Microvista die Rohdaten direkt in die Analyse-Software des Forschungsinstituts."
  - title: "Prototypen-Feedback"
    description: "Microvista analysiert Entwicklungsmuster in der Regel innerhalb von 24 bis 48 Stunden und liefert Befunde zu Geometrieabweichungen, inneren Defekten und Prozessfehlern, die direkt in die nächste Konstruktionsiteration einfließen. Der Express-Turnaround verkürzt Entwicklungszyklen deutlich und macht CT-Feedback zu einem integralen Bestandteil des iterativen Entwicklungsprozesses. Kunden erhalten dabei nicht nur Messdaten, sondern auch eine Einschätzung der möglichen Fehlerursachen."
  - title: "Failure Analysis für Forschung"
    description: "Microvista erstellt detaillierte 3D-Schadensanalysen an Versagensbauteilen, Ermüdungsproben und beschädigten Materialien für wissenschaftliche Untersuchungen und Normungsarbeiten. Die Prüfberichte sind nach ISO 17025 ausgestellt und damit für Publikationen in referierten Fachzeitschriften sowie für normative Referenzdokumente geeignet. Auf Wunsch werden Befunde gemeinsam mit dem Forschungsteam interpretiert und für die Verwendung in Förderanträgen aufbereitet."
  - title: "Cloud-Rohdaten-Lieferung"
    description: "Microvista liefert CT-Rohdaten direkt über die gesicherte Microvista Cloud in gängigen Volumendatenformaten, die mit VGStudio MAX, Dragonfly, VGMETROLOGY und anderen Analyse-Tools kompatibel sind. Das Institut behält die vollständige Kontrolle über die Datenauswertung und kann eigene Algorithmen auf die Rohdaten anwenden. Die verschlüsselte Cloud-Übertragung stellt sicher, dass vertrauliche Forschungsdaten nicht in fremde Hände gelangen."
useCases:
  - "Neue Leichtbaulegierungen und Hochtemperaturwerkstoffe: CT charakterisiert Porenverteilung, Korngefüge und Phasenzusammensetzung an repräsentativen Probenvolumina – statistisch belastbar und publikationsreif."
  - "Additive Fertigung – Parameteroptimierung: CT quantifiziert nach jedem Parameterwechsel die Auswirkungen auf Porosität und Gefüge, was Entwicklungszyklen bei SLM/DMLS erheblich verkürzt."
  - "Biomed-Forschung – Knochen und bioresorbierbare Implantate: CT analysiert Porosität, Trabekelstruktur und Degradationsgrad an Knochenproben und resorbierbaren Implantatmaterialien."
  - "Batterieforschung – Zellalterung und Degradation: CT macht Li-Plating, Dendritenbildung und Elektrodendegradation in gealtertem Zellmaterial dreidimensional sichtbar."
