name: "Windenergie & Erneuerbare Energien"
slug: "windenergie"
description: "CT-Prüfung für Windenergie-Komponenten – Qualitätssicherung für zuverlässige Anlagen. Getriebeteile, Rotorblattsegmente, Lagergehäuse: CT-Prüfung vor der Montage verhindert kostspielige Wartungsausfälle und verlängert die Lebensdauer von Windenergieanlagen signifikant."
heroImage: "/images/branchen/energie.jpg"
challenges:
  - title: "Unentdeckte Fehler in Getriebekomponenten führen zu ungeplanten Wartungsausfällen mit hohen Kosten"
    description: "Ein ungeplanter Getriebeausfall einer Windenergieanlage kostet je nach Standort und Saison mehrere Zehntausend Euro allein für Stillstandszeit und Kranleistung – von den Instandsetzungskosten abgesehen. Rissinitiierungen und Materialermüdung in Planetenträgern, Zahnrädern und Lagersitzen entstehen schleichend und sind ohne 3D-Analyse nicht frühzeitig erkennbar. CT-Prüfung vor der Montage oder nach der ersten Inspektionsperiode identifiziert kritische Defekte, bevor sie zum Totalausfall führen."
  - title: "Rotorblattsegmente aus GFK/CFK sind mit konventionellen Methoden nicht auf Delamination prüfbar"
    description: "GFK-Rotorblätter akkumulieren im Betrieb Schäden durch Ermüdung, Hagel und Blitzeinschlag, die im Inneren des Laminats als Delaminationen und Klebenahtrisse beginnen – von der Oberfläche lange unsichtbar. Ultraschall-Handmessung vor Ort liefert zwar erste Anhaltspunkte, ermöglicht aber keine vollständige 3D-Charakterisierung von Schadensausdehnung und -tiefe, die für Reparaturentscheidungen notwendig wäre. CT erfasst diese Defekte vollständig und dreidimensional und hilft, wirtschaftlich sinnvolle Reparaturentscheidungen zu treffen."
  - title: "Großbauteile können nicht einfach zum CT-Labor transportiert werden – mobiles CT ist nötig"
    description: "Maschinenträger, Nabenkomponenten und Getriebegehäuse einer Windenergieanlage wiegen mehrere Tonnen und lassen sich nicht ohne weiteres zum Prüflabor transportieren. Der Aufwand für Demontage, Transport, Verpackung und Remontage übersteigt häufig die Prüfkosten und verursacht zusätzliche Stillstandszeiten. Das mobile ScanExpress-System kommt direkt zum Produktionsstandort oder Wartungsbahnhof und prüft die Bauteile dort, wo sie sind."
  - title: "Lagergehäuse aus Guss müssen auf Porosität geprüft werden bevor sie auf der Gondel installiert werden"
    description: "Traglager, Hauptlagergehäuse und Maschinenträger aus Grauguss oder Sphäroguss sind im Betrieb dauerhaft hohen statischen und dynamischen Lasten ausgesetzt. Porosität und Lunker in tragenden Querschnitten initiieren Ermüdungsrisse, die unter Dauerlast zum schlagartigen Versagen führen können – mit katastrophalen Folgen bei mehrere Tonnen schweren Gondelbauteilen. CT-Prüfung vor der Montage sichert die Bauteilqualität und schafft die Grundlage für eine zuverlässige Lebensdauerprognose."
solutions:
  - title: "Getriebekomponenten-Prüfung"
    description: "Microvista analysiert Zahnräder, Wellenlager und Planetenträger aus Windenergie-Getrieben vollständig in 3D auf Risse, Poren, Einschlüsse und Ermüdungsschäden, die bei konventioneller Sichtprüfung nicht erkennbar sind. Das Ergebnis ist ein vollständiges Prüfprotokoll mit Defektlokalisierung und Freigabeempfehlung, das für Instandhaltungsplanungen und Austauschentscheidungen direkt verwendbar ist. Auf Wunsch erstellt Microvista einen Zustandsreport als Grundlage für die verbleibende Nutzungsdauer."
  - title: "Rotorblatt-Faseranalyse"
    description: "Microvista analysiert GFK-Rotorblattsegmente und Klebenähte in 3D auf Delaminationen, Void-Einschlüsse und Faserwellung – mit CT-Systemen, die für die charakteristischen Wandstärken und Krümmungsradien von Rotorblättern optimiert sind. Die Befunde ermöglichen eine fundierte Einschätzung der Schadensausdehnung und der noch verbleibenden Restfestigkeit, auf deren Basis Reparatur oder Austausch wirtschaftlich bewertet werden kann. Das Prüfergebnis wird in einer 3D-Visualisierung geliefert, die Wartungsteams direkt einsetzen können."
  - title: "Vor-Ort-Prüfung mit ScanExpress"
    description: "Das mobile ScanExpress-System von Microvista kommt direkt zum Windpark, zur Montagehalle oder zum Wartungsbahnhof und prüft Komponenten dort, wo sie sich befinden – ohne aufwendige Demontage oder Transport. Für Großteile mit Hüllkreisen bis 798 mm steht die Long-Version des Systems zur Verfügung. Just-in-Time-Prüfung direkt vor der Gondelmontage schließt fehlerhafte Bauteile sicher aus, ohne den Montageplan zu gefährden."
  - title: "Gusslager & Strukturteile"
    description: "Microvista prüft Lagergehäuse, Maschinenträger und Nabenkomponenten aus Grauguss und Sphäroguss vollständig auf Porosität, Lunker und Gefügehomogenität. Das Prüfprotokoll enthält eine normkonforme Defektklassifizierung nach ASTM E505 und eine klare Freigabe- oder Ausschussempfehlung. Für wiederholte Prüfungen gleicher Bauteile werden parametrierte Prüfprogramme hinterlegt, die eine schnelle und reproduzierbare Serienprüfung ermöglichen."
useCases:
  - "Planetengetriebe-Zahnräder und Lagersitze: CT prüft innere Risse, Poren und Gefügequalität, die unter Dauerlast zu Frühausfällen führen würden – Grundlage für Instandhaltungsentscheidungen."
  - "GFK-Rotorblattsegmente auf Delamination und Klebenahtstatus: CT liefert 3D-Schadensbild für wirtschaftlich begründete Reparatur- oder Austauschentscheidungen nach Betriebsinspektion."
  - "Gusskörper – Maschinenträger und Nabenverstärkungen: CT-Porositätsprüfung nach ASTM E505 vor der Gondelmontage sichert die strukturelle Integrität der lastragenden Bauteile."
  - "Stahlflansche und Schweißverbindungen: CT prüft Schweißnähte auf Poren, Risse und Bindefehler und bewertet die Materialhomogenität im Flanschbereich – normkonform nach DIN EN ISO 5817."
