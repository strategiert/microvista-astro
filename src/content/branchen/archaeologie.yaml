name: "Archäologie & Paläontologie"
slug: "archaeologie"
description: "Archäologische Artefakte mit CT analysieren – zerstörungsfrei, vor Ort, ohne Transportrisiko. Wertvolle Fundstücke müssen nicht mehr riskant transportiert werden. Mit dem ScanExpress kommt das CT direkt ins Museum – und enthüllt in Stunden, was sonst Monate dauert."
heroImage: "/images/wp/2022/06/stators.jpg"
challenges:
  - title: "Wertvolle und zerbrechliche Artefakte können nicht riskant in ein CT-Labor transportiert werden"
    description: "Einmalige archäologische Objekte – bronzezeitliche Hortfunde, ägyptische Mumien, mittelalterliche Reliquiare – sind irreparabel, sobald sie beschädigt werden. Der Transport zu einem CT-Labor erfordert aufwendige Verpackung, teure Kunsttransportversicherungen und stellt ein strukturelles Schadensrisiko dar, das Museen und Denkmalbehörden nicht eingehen können. Verlorene oder beschädigte Artefakte sind für die Wissenschaft und das kulturelle Erbe unwiederbringlich."
  - title: "Freilegung von Fundstücken dauert Monate und birgt Beschädigungsrisiko"
    description: "Die mechanische Freilegung von Fundstücken aus Sediment, Korrosionsschichten oder Erde ist zeitintensiv und geht zwangsläufig mit dem Risiko einher, Strukturen im Inneren zu beschädigen oder zu zerstören. Monate der Präparationsarbeit können vergebens sein, wenn der eigentliche Fund durch das Freilegen beeinträchtigt wird. CT ermöglicht die vollständige Analyse des Inhalts, noch bevor eine Freilegung überhaupt beginnt – und spart damit Zeit, Kosten und Substanz."
  - title: "Inhalt von Gefäßen und Hortfunden kann ohne Öffnung nicht bestimmt werden"
    description: "Geschlossene Bronzegefäße, versiegelte Tongefäße oder kompakte Bodensenken aus Hortfunden enthalten häufig mehrere Objekte, Organreste oder Textilien, die erst nach dem Öffnen sichtbar werden. Dieses Öffnen verändert oder zerstört unwiderruflich den Kontext – und damit entscheidende Informationen für die Datierung und Interpretation. Mit CT lässt sich der gesamte Inhalt eines Funds dreidimensional erfassen und dokumentieren, ohne die Fundeinheit jemals zu öffnen."
  - title: "Fälschungsnachweis und Authentizitätsprüfung ohne destruktive Methoden schwierig"
    description: "Im Kunstmarkt kursierende Fälschungen antiker Objekte sind äußerlich oft kaum von Originalen zu unterscheiden. Herkömmliche Analysemethoden wie Thermolumineszenz oder RFA benötigen Probeentnahmen und liefern keine vollständige Aussage zur Herstellungstechnik. Die CT-Analyse zeigt innere Bearbeitungsspuren, Guss- oder Schmiedestrukturen sowie nachträgliche Restaurierungen, die eine sichere Authentizitätsbewertung ohne jede Materialentnahme erlauben."
solutions:
  - title: "Vor-Ort-Scanning mit ScanExpress"
    description: "Das mobile ScanExpress-System von Microvista kommt direkt ins Museum, in das Depot oder auf die Grabungsstelle – ohne dass ein einziges Objekt sein Lager verlassen muss. Transportrisiko, Versicherungsaufwand und logistische Hürden entfallen vollständig. Der Kunde erhält vollständige 3D-CT-Datensätze vor Ort, die im Anschluss für Forschung, Restaurierung oder Präsentation genutzt werden können."
  - title: "3D-Modelle für Museumspräsentation"
    description: "Aus den CT-Rohdaten erstellt Microvista hochauflösende 3D-Modelle, die für interaktive Ausstellungsstationen, Hologramme oder digitale Ausstellungskataloge aufbereitet werden können. Besucher können das Innere eines Artefakts virtuell erkunden, ohne dass das Original je berührt wird. Für Forschungseinrichtungen werden die Daten in Standardformaten geliefert, die in gängige wissenschaftliche Analyse- und Visualisierungstools importierbar sind."
  - title: "Hortfund-Analyse"
    description: "Microvista digitalisiert ganze Hortfunde inklusive der umgebenden Erdmatrix in einer einzigen CT-Messung – ohne Freilegung, ohne Präparation. Das Ergebnis ist ein vollständiges dreidimensionales Inventar aller enthaltenen Objekte mit Lage, Form und Materialzusammensetzung. Archäologen können die Fundkonstellation virtuell rekonstruieren und gezielt entscheiden, welche Teile freigelegt werden und in welcher Reihenfolge."
  - title: "Authentizitätsprüfung"
    description: "Microvistas CT-Analyse macht Herstellungstechniken wie Gusskerne, Schmiedespuren, Fügestellen und nachträgliche Restaurierungen im Inneren eines Objekts vollständig sichtbar. Im Vergleich mit Referenzartefakten und historischen Herstellungsmerkmalen lassen sich Fälschungen, moderne Reproduktionen und Restaurierungen eindeutig identifizieren – ohne eine einzige Probe zu entnehmen. Das Prüfergebnis ist gerichtsfest dokumentiert und für Gutachten, Ankaufsentscheidungen oder Rückgabeverfahren verwendbar."
useCases:
  - "Metallische Hortfunde des Landesamts für Denkmalpflege: CT erstellt ein vollständiges 3D-Inventar aller Objekte innerhalb des ungeöffneten Funds – Lage, Anzahl und Materialzusammensetzung in einem Scan."
  - "Antike Keramikgefäße: CT rekonstruiert Töpfertechnik, Reparaturen mit antiken Klammern und Restaurierungsgeschichte, ohne das Objekt zu öffnen oder anzutasten."
  - "Münzschätze: Artenbestimmung, Stapelreihenfolge und Erhaltungszustand aller Münzen werden dreidimensional erfasst, ohne den Schatz auseinanderzunehmen."
  - "Fossilien: Innere Skelettstrukturen, Zähne und Weichteilabdrücke werden ohne Präparation analysiert – CT spart Monate Freilegungsarbeit und schützt das Fossil."
