name: "Maschinenbau & Anlagenbau"
slug: "maschinenbau"
description: "CT-Prüfung für Maschinenbau – von der Schadensanalyse bis zum Reverse Engineering. Für Maschinenbau und Anlagenbau bietet Microvista das vollständige ZfP-Spektrum: Schadensanalyse, Reverse Engineering alter Bauteile und normkonforme Qualitätsprüfung für Zulieferteile."
heroImage: "/images/branchen/maschinenbau.jpg"
challenges:
  - title: "Schadensursachen bei Maschinenausfällen bleiben ohne 3D-Analyse im Dunkeln"
    description: "Wenn eine Maschine oder Anlage unerwartet ausfällt, muss die Ursache schnell und eindeutig geklärt werden – um Wiederholungsausfälle zu vermeiden und Haftungsfragen zu beantworten. Konventionelle Sichtprüfung und 2D-Röntgen reichen für die vollständige Schadensanalyse komplex belasteter Maschinenteile nicht aus, weil Rissursprünge, Ermüdungslinien und Sekundärschäden oft tief im Bauteilinneren liegen. Ohne belastbare Fehlerursachenanalyse sind gezielte Abhilfemaßnahmen nicht möglich – und die nächste ungeplante Abschaltung vorprogrammiert."
  - title: "Zeichnungen alter Ersatzteile existieren nicht mehr – Neukonstruktion nötig"
    description: "Bei Anlagen mit langer Betriebshistorie existieren für viele Ersatzteile keine aktuellen Zeichnungen mehr – Konstruktionsdaten wurden nicht übergeben, Original-CAD-Daten sind verloren oder die Teile wurden in der Fertigung vom Zeichnungsstand abweichend hergestellt. Ohne vollständige Bemaßung kann kein Ersatzteil bestellt oder gefertigt werden, was Produktionsstillstände verlängert. CT-basiertes Reverse Engineering erfasst alle Geometriedaten des vorhandenen Altteils in Stunden, ohne es zu demontieren."
  - title: "Hydraulik- und Pneumatikkomponenten aus Guss zeigen innere Defekte erst beim Versagen"
    description: "Ventilgehäuse, Steuerblocke und Pumpenkörper aus Guss arbeiten unter hohem Systemdruck und sind thermomechanischer Dauerbeanspruchung ausgesetzt. Porosität, Lunker oder Kanalwandabweichungen in diesen Bauteilen bleiben bei konventioneller Prüfung unentdeckt und führen zu Undichtigkeiten, Ermüdungsrissen oder Kanalblockaden – oft mit erheblichem Folgeschaden an der Gesamtanlage. CT-Prüfung vor der Inbetriebnahme schließt diese Fehler aus."
  - title: "Zulieferer-Erstmuster müssen schnell und zuverlässig qualifiziert werden"
    description: "Bei der Qualifizierung neuer Zulieferer oder beim Wechsel auf alternative Fertigungsstandorte ist die schnelle und lückenlose Prüfung von Erstmustern entscheidend, um Serienanlaufrisiken zu minimieren. Taktile Messung allein erfasst keine inneren Merkmale und reicht für die vollständige Bauteilqualifizierung bei gegossenen oder gesinterten Komponenten nicht aus. CT-Messung liefert Innen- und Außenmerkmale in einem einzigen Prüfgang und ermöglicht eine fundierte Freigabe- oder Nacharbeitsempfehlung."
solutions:
  - title: "Schadensanalyse"
    description: "Microvista analysiert gebrochene, gerissene oder versagte Maschinenteile in vollständiger 3D-Darstellung auf Rissursprung, Ausbreitungsrichtung, Ermüdungslinien und Sekundärschäden. Das vollständige Schadensprotokoll enthält eine Bewertung der Fehlerursache und – wo CT-basiert möglich – Empfehlungen für konstruktive oder betriebliche Abhilfemaßnahmen. Bei Produktionsausfällen bietet Microvista einen Express-Service mit Turnaround innerhalb von 24 bis 48 Stunden."
  - title: "Reverse Engineering"
    description: "Microvista erfasst alle Innen- und Außengeometrien eines Altbauteils per CT-Scan und rekonstruiert daraus ein vollständiges 3D-CAD-Modell, das für die Fertigung von Ersatzteilen direkt verwendet werden kann. Auch innere Kanalverläufe, Wandstärken und Passbohrungen werden vollständig und maßhaltig erfasst – ohne das Bauteil zu demontieren oder zu beschädigen. Das Ergebnis ist eine vollständige Zeichnungsdokumentation in kundenseitig gewähltem CAD-Format."
  - title: "Hydraulik- & Ventilblockprüfung"
    description: "Microvista prüft Hydraulikventile, Steuerblöcke und Pumpenkörper auf Kanalgeometrie, Wandstärken, Passbohrungspositionen und Gussfehler in einem einzigen CT-Scan. Abweichungen von der Zeichnung werden im farbkodierten CAD-Abgleich unmittelbar sichtbar, und Gussfehler werden nach Größe und Position klassifiziert. Der Kunde erhält damit die Grundlage für eine fundierte Inbetriebnahmeentscheidung und vermeidet Folgeschäden durch druckführende Bauteile mit latenten Defekten."
  - title: "Zulieferer-Erstmuster"
    description: "Microvista qualifiziert Zulieferer-Erstmuster zügig mit vollständiger CT-Messung aller Innen- und Außenmerkmale sowie einem CAD-Abgleich, der Maßabweichungen auf den ersten Blick sichtbar macht. Das Prüfprotokoll enthält eine klare Freigabe- oder Nacharbeitsempfehlung mit Priorisierung der Abweichungen nach Relevanz für Funktion und Montage. Der Maschinenbauer erhält damit eine belastbare Entscheidungsgrundlage für Serienanlauf oder Werkzeugkorrektur beim Zulieferer."
useCases:
  - "Hydraulikventile und Steuerblöcke: CT prüft Kanalgeometrie, Wandstärken und Gussfehler in druckbeaufschlagten Bauteilen vor der Inbetriebnahme – verhindert Undichtigkeiten und Folgeschäden."
  - "Schadensanalyse – gebrochene Werkzeuge, Lager und Getriebeteile: CT lokalisiert Rissursprung und Ausbreitungsrichtung in 3D, liefert die Grundlage für Ursachenbeseitigung und Schadensprotokoll."
  - "Reverse Engineering – fehlende Zeichnungen für Anlagenersatzteile: CT erfasst alle Innen- und Außengeometrien eines Altteils und erstellt daraus ein vollständiges 3D-CAD-Modell für die Neufertigung."
  - "Pumpengehäuse aus Guss: CT bewertet Gussqualität, Passbohrungspositionen und Anbauflansch-Maßhaltigkeit für Zulieferer-Erstmusterfreigaben."
