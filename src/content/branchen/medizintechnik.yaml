name: "Medizintechnik & Pharma"
slug: "medizintechnik"
description: "CT-Prüfung für Medizintechnik & Pharma – lückenlose Qualitätssicherung nach MDR und FDA. Implantate, Chirurgieinstrumente, Pharmaverpackungen: Microvista prüft medizintechnische Produkte zerstörungsfrei nach MDR, ISO 13485 und FDA 21 CFR Part 820 – vollständig dokumentiert."
heroImage: "/images/wp/2022/08/Soll-Ist-Vergleich-Handprothese-Zerstoerungsfreie-Pruefung-von-Medizintechnik.webp"
challenges:
  - title: "MDR und FDA verlangen lückenlosen Qualitätsnachweis – Stichproben reichen nicht mehr aus"
    description: "Die EU-Medizinprodukteverordnung (MDR 2017/745) und die FDA 21 CFR Part 820 verlangen für Klasse-II- und Klasse-III-Medizinprodukte eine vollständige und rückverfolgbare Qualitätsdokumentation – Stichprobenprüfung genügt für kritische Merkmale nicht mehr. Lücken in der Qualitätsdokumentation gefährden die CE-Kennzeichnung und FDA-Zulassung und können in Audits zu Nicht-Konformitäten führen. Akkreditierte CT-Prüfberichte nach ISO 17025 liefern die notwendige Beweissicherung für Notified Bodies und Behörden."
  - title: "Implantate mit Gitterstrukturen (3D-gedrucktes Titan) lassen sich nur mit CT prüfen"
    description: "Additiv gefertigte Titanimplantate mit offenporigen Gitterstrukturen für die Knocheneinwachsung haben innere Geometrien, die mit keiner anderen Methode als CT vollständig und zerstörungsfrei analysiert werden können. Fehlerhafte Gitterbereiche, Porendefekte oder unvollständige Stützstrukturen beeinflussen die mechanische Belastbarkeit und die Osseointegration direkt. Nur CT liefert den vollständigen 3D-Nachweis der Gitterstruktur-Integrität, den Regulatoren und Notified Bodies fordern."
  - title: "Pharmaverpackungen (Blister) müssen auf Vollständigkeit geprüft werden ohne zu öffnen"
    description: "Fehlende, gebrochene oder doppelt befüllte Tabletten in Blisterverpackungen stellen ein direktes Patientensicherheitsrisiko dar und sind mit Sichtprüfung allein nicht zuverlässig erkennbar – insbesondere bei undurchsichtigen Aluminiumverbundfolien. Rückrufe aufgrund fehlerhafter Befüllung sind in der Pharmabranche mit erheblichen Kosten und Reputationsschäden verbunden. CT prüft die vollständige Befüllungsintegrität jeder Kammer einer Blisterpackung ohne eine einzige Packung zu öffnen."
  - title: "Porosität in Implantat-Oberflächen beeinflusst Osseointegration und muss kontrolliert werden"
    description: "Die Porosität der Implantatoberfläche – besonders bei aufgerauten oder beschichteten Titanoberflächen – ist ein entscheidender Parameter für die Osseointegration: Zu wenig Porosität hemmt das Knochenwachstum, zu viel Porosität schwächt die mechanische Struktur. Konventionelle Rauheitsmessungen erfassen nur die Oberflächentopografie, nicht die sub-oberflächliche Porenverteilung. CT liefert den vollständigen 3D-Nachweis der Porenstruktur für regulatorische Dokumentation und Produktentwicklung."
solutions:
  - title: "Implantat-Porositätsanalyse"
    description: "Microvista analysiert Titan-, CoCrMo- und PEEK-Implantate vollständig in 3D auf Porositätsgrad, Porenverteilung, Oberflächenstruktur und Gitterstruktur-Integrität. Das Ergebnis ist ein normkonformes Prüfprotokoll mit quantitativer Porositätsangabe, das für die Produktdokumentation nach MDR und ISO 13485 direkt verwendet werden kann. Die Prüfung ist vollständig zerstörungsfrei – das Implantat bleibt nach der CT-Analyse uneingeschränkt verwendbar."
  - title: "Pharmaverpackungs-Prüfung"
    description: "Microvista prüft Blister und Primärverpackungen auf vollständige und unbeschädigte Befüllung, Maßhaltigkeit der Kavitäten und Siegelintegrität der Versiegelung – ohne eine einzige Verpackung zu öffnen. Die vollautomatische Auswertung klassifiziert jede Kammer nach Befüllungsstatus und meldet Abweichungen mit positionsgenauen Angaben. Das Ergebnis ist ein lückenloses Qualitätsprotokoll, das für GMP-Dokumentation und regulatorische Inspektionen verwendet werden kann."
  - title: "Chirurgieinstrumente-QS"
    description: "Microvista prüft Minimal-Invasiv-Instrumente, Endoskope und Chirurgieinstrumente auf Maßhaltigkeit aller Funktionsmaße, innere Materialfehler wie Poren und Risse sowie Schweißnahtqualität an Verbindungsstellen. Besonders bei kleinen, filigranen Instrumenten mit innenliegenden Kanälen und Gelenken liefert CT Informationen, die mit taktiler Messung nicht zugänglich sind. Das Prüfprotokoll ist nach ISO 13485 und MDR strukturiert und für Qualitätsaudits sofort verwendbar."
  - title: "Regulatory-konforme Berichte"
    description: "Microvista erstellt alle Prüfberichte nach den gültigen regulatorischen Anforderungen – FDA 21 CFR Part 820, ISO 13485 und EU MDR – mit vollständiger Verfahrensbeschreibung, Kalibrierungsnachweisen und revisionssicherer Archivierung. Die Prüfprozesse sind in validierten Verfahrensanweisungen dokumentiert, was eine direkte Übernahme in das Qualitätsmanagementsystem des Kunden ermöglicht. Auf Anfrage unterstützt Microvista bei der Aufbereitung von Prüfdaten für Notified-Body-Audits."
useCases:
