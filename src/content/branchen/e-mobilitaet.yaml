name: "E-Mobilität / Batteriesysteme"
slug: "e-mobilitaet"
description: "CT-Prüfung für Batteriesysteme – Sicherheitsrisiken erkennen, bevor sie zur Gefahr werden. Kurzschlüsse, Elektrolytfolien-Schäden, fehlerhafte Kontakte: Microvista prüft Lithium-Ionen-Zellen, Module und Packs zerstörungsfrei – ohne Demontage, direkt nach der Fertigung."
heroImage: "/images/wp/2022/06/stators.jpg"
challenges:
  - title: "Verborgene Produktions- und Montagefehler in Lithium-Zellen führen zu Thermal Runaway"
    description: "Fertigungsbedingte Defekte wie Elektrolytenbenetzungsfehler, Separator-Falten, metallische Partikeleinschlüsse oder fehlerhafte Elektrodenwicklung können in Lithium-Ionen-Zellen unkontrollierte Wärmeentwicklung auslösen. Thermal Runaway ist eine der gefährlichsten Fehlerquellen im EV- und Consumer-Bereich – mit dem Risiko von Fahrzeugbränden, Produktrückrufen und massiven Haftungsfolgen. Ohne zerstörungsfreie 100%-Prüfung bleibt dieses Risiko in jeder Seriencharge latent vorhanden."
  - title: "Smartphone- und EV-Akkus können nicht destruktiv geprüft werden ohne Sicherheitsrisiko"
    description: "Lithium-Ionen-Zellen können nicht geöffnet, zerschnitten oder metallografisch präpariert werden, ohne dass Kurzschluss-, Brand- oder Explosionsgefahr besteht. Herkömmliche ZfP-Methoden wie Ultraschall oder Röntgen sind für die dreidimensionale Analyse gewickelter Zellstacks ungeeignet. CT ist die einzige Prüfmethode, die vollständige Aussagen über die Innenstruktur einer Zelle liefert, ohne ihre chemische Integrität zu gefährden."
  - title: "Kontakt- und Isolationsschäden sind mit konventionellen Methoden nicht detektierbar"
    description: "Fehlpositionierte Ableiterfahnen, beschädigte Separatoren oder unzureichend verschweißte Stromkollektoren sind mit Sichtprüfung, Elektrochemie-Tests oder klassischem 2D-Röntgen nicht verlässlich erkennbar. Diese Defekte führen zu erhöhtem Innenwiderstand, Kapazitätsverlust oder plötzlichem Ausfall unter Belastung – oft erst nach Auslieferung des Endprodukts. CT liefert die vollständige dreidimensionale Ansicht aller kontaktrelevanten Strukturen in einer einzigen Messung."
  - title: "Steigende regulatorische Anforderungen (EU Battery Regulation) erfordern lückenlosen Qualitätsnachweis"
    description: "Die EU Battery Regulation (EU 2023/1542) verpflichtet Hersteller zum vollständigen Qualitätsnachweis und zur Rückverfolgbarkeit jeder Batteriezelle – Stichprobenprüfung genügt künftig nicht mehr. Fehlende oder lückenhafte Prüfdokumentation kann zur Verweigerung der Markteinführung oder zu Bußgeldern führen. CT-gestützte 100%-Prüfung mit automatischem Prüfprotokoll schafft die erforderliche Traceability und ist direkt in Compliance-Dokumentationssysteme einspielbar."
solutions:
  - title: "Lithium-Ionen-Zellprüfung"
    description: "Microvista analysiert Zylinder-, Pouch- und Prismazellen vollständig in 3D auf Kontaktfahnen-Position, Folienwicklungsqualität, Gasblasen, Separator-Falten und metallische Partikeleinschlüsse. Das Ergebnis ist ein lückenloses Prüfprotokoll für jede Zelle – ohne diese zu öffnen, zu beschädigen oder chemisch zu verändern. Der Hersteller erhält damit die Grundlage für eine regulatorisch sichere Serienfreigabe und kann fehlerhafte Zellen vor dem Modulaufbau aussortieren."
  - title: "Batterie-Pack-Inspektion"
    description: "Microvista prüft komplette Batteriemodule und -packs auf korrekte Positionierung aller Zellen, Verschweißungsqualität der Stromschienen, Kühlkanalgeometrie und Dichtheit der Modulumhausung. Montagefehler wie verschobene Zellen, fehlende Kontaktierung oder undichte Kühlmittelführungen werden zuverlässig detektiert, bevor das Modul verbaut wird. Der Kunde vermeidet teure Demontagen und Nacharbeiten im späteren Produktionsprozess."
  - title: "Inline-CT mit ScanExpress"
    description: "Das mobile ScanExpress-System von Microvista kann direkt an der Produktionslinie betrieben werden und prüft Batteriezellen unmittelbar nach der Fertigung – ohne Unterbrechung des Fertigungsflusses. Die Compact-Version ist speziell für dichte Batteriezellen optimiert und liefert Befunde in unter 60 Sekunden. Fehlerhafte Zellen werden automatisch ausgesteuert, bevor sie in den Modulaufbau eingeschleust werden."
  - title: "100%-Prüfung bei Serienfertigung"
    description: "Microvistas KI-gestützte Auswertesoftware analysiert vollautomatisch alle relevanten Prüfmerkmale einer Batteriezelle und trifft die Gut/Schlecht-Entscheidung ohne manuelle Befundauswertung. Die Erkennungsalgorithmen werden auf die spezifischen Fehlerbilder des Kunden trainiert, was die Falschpositivrate minimiert und den Durchsatz maximiert. Jedes Prüfergebnis wird automatisch protokolliert und ist für Compliance-Zwecke vollständig rückverfolgbar."
useCases:
  - "Lithium-Ionen-Rundzellen (18650, 21700, 4680): CT prüft Elektrodenwicklung, Separator-Integrität und Kontaktfahnen-Position – vollautomatisch in unter 60 Sekunden pro Zelle."
  - "Pouch-Zellen für Elektrofahrzeuge und Consumer Electronics: Folienstapelung, Ableiterkontaktierung und Gasblasen werden dreidimensional erfasst, bevor die Zelle in das Modul eingebaut wird."
  - "Batteriemodul-Montageprüfung: CT kontrolliert Verschweißungsqualität der Stromschienen, Kühlkanalgeometrie und korrekte Zellpositionierung im Modulrahmen."
  - "E-Bike- und E-Scooter-Akkupacks: Vollständige Qualitätsprüfung auf Zellebene und Modulebene zur Einhaltung von Sicherheitsnormen und regulatorischen Anforderungen."
